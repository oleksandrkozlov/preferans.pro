<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/prefbuff/favicon.ico" sizes="any" />
  <title>PREFBUFF - Preferans Statistics</title>
  <style>
    @font-face {
      font-family: "PreferansClient";
      src: url("/assets/fonts/DejaVuSans.ttf") format("truetype");
      font-display: swap;
    }
    :root {
      --bg: #282a36;
      --panel: #44475a;
      --panel-2: #6272a4;
      --text: #f8f8f2;
      --muted: #6272a4;
      --accent: #8be9fd;
      --red: #ff5555;
      --line: #6272a4;
      --green: #50fa7b;
      --orange: #ffb86c;
      --yellow: #f1fa8c;
      --pink: #ff79c6;
      --purple: #bd93f9;
      --table-border: #7e8aa8;
      --table-bg: #2e3448;
      --table-bg-alt: #2b3043;
      --table-head-bg: #252b3c;
      --table-total-bg: #3a415a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 10% 10%, #44475a 0%, var(--bg) 55%);
      color: var(--text);
    }
    .app {
      display: grid;
      grid-template-columns: 131px 1fr;
      min-height: 100vh;
    }
    .app.sidebar-hidden {
      grid-template-columns: 1fr;
    }
    .app.sidebar-hidden > .sidebar {
      display: none;
    }
    .user-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-height: 32px;
      margin-bottom: 8px;
    }
    .user-header h2 {
      display: flex;
      align-items: center;
      margin: 0;
      line-height: 1.1;
    }
    .sidebar-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: none;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--table-border);
      background: var(--table-bg-alt);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }
    .sidebar-toggle:hover { border-color: var(--accent); }
    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(40, 42, 54, 0.8);
      backdrop-filter: blur(3px);
      padding: 14px;
      overflow: auto;
    }
    .main {
      padding: 16px;
    }
    h1 { margin: 0 0 6px; font-size: 16px; text-align: center; cursor: pointer; }
    .app-title {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      max-width: 100%;
      font-family: "PreferansClient", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .app-title-top {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 4px;
      text-shadow: 1px 1px 0 rgba(126, 138, 168, 0.35);
    }
    .app-title-main {
      line-height: 1;
      font-weight: 400;
    }
    .app-title-pro-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      margin-top: 2px;
    }
    .app-title-pro {
      color: var(--orange);
      font-size: 0.42em;
      line-height: 1;
      letter-spacing: 0.05em;
      font-weight: 400;
      text-shadow: 0.5px 0.5px 0 rgba(255, 184, 108, 0.4);
    }
    .app-title-pro-line {
      width: calc(100% + 2px);
      height: 1px;
      margin-left: 0;
      background: var(--orange);
      transform: rotate(-6deg);
      transform-origin: left center;
      opacity: 0.85;
      border-radius: 999px;
    }
    .app-title-sub {
      color: var(--muted);
      font-size: 1.23em;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
    .list-item {
      border: 1px solid var(--table-border);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      background: var(--table-bg-alt);
      cursor: pointer;
    }
    .list-item:hover { border-color: var(--accent); }
    .list-item.active { outline: 2px solid var(--accent); }
    .name { font-weight: 700; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .section {
      border: 1px solid var(--table-border);
      border-radius: 12px;
      background: var(--table-bg);
      padding: 12px;
      margin-bottom: 14px;
    }
    .section h2 { margin: 0 0 8px; font-size: 18px; }
    .section h2.clearable {
      cursor: pointer;
    }
    .summary-cards,
    .hand-stats-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .summary-card {
      border: 1px solid var(--table-border);
      border-radius: 10px;
      background: var(--table-bg-alt);
      padding: 7px 8px;
      min-width: 0;
    }
    .summary-card[data-action] {
      cursor: pointer;
    }
    .summary-card[data-action]:hover {
      border-color: var(--accent);
    }
    .summary-card.is-active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(139, 233, 253, 0.35);
    }
    .summary-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
      font-weight: 700;
    }
    .summary-value {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0 6px;
      font-size: clamp(15px, 1.2vw, 18px);
      font-weight: 700;
      line-height: 1.2;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      overflow-wrap: anywhere;
    }
    .summary-subvalue {
      font-size: 12px;
      font-weight: 700;
      opacity: 0.92;
    }
    .games-block {
      margin-bottom: 14px;
    }
    .trend-panel {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      margin-bottom: 10px;
    }
    .trend-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .trend-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      color: var(--muted);
    }
    .trend-value { font-size: 12px; color: #d7def5; }
    .trend-svg {
      width: 100%;
      height: 96px;
      display: block;
      border-radius: 8px;
      background: #252b3c;
      border: 1px solid rgba(126, 138, 168, 0.45);
    }
    .trend-point {
      fill: #252b3c;
      stroke-width: 1.6;
    }
    .trend-label {
      font-size: 9px;
      font-weight: 700;
      paint-order: stroke;
      stroke: rgba(37, 43, 60, 0.95);
      stroke-width: 2px;
      stroke-linejoin: round;
    }
    .trend-hover-line {
      stroke: var(--yellow);
      stroke-width: 1;
      stroke-dasharray: 3 3;
      display: none;
      pointer-events: none;
    }
    .hand-stats {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      margin-bottom: 10px;
    }
    .hand-stat-card {
      border: 1px solid var(--table-border);
      border-radius: 8px;
      background: var(--table-bg);
      padding: 8px;
      min-width: 0;
    }
    .hand-stat-card[data-action]:hover {
      border-color: var(--accent);
    }
    .hand-stat-card[data-action] {
      cursor: pointer;
    }
    .hand-stat-card.is-active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(139, 233, 253, 0.35);
    }
    .hand-stat-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
      font-weight: 700;
    }
    .hand-stat-value {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0 6px;
      color: #d7def5;
      font-size: clamp(14px, 1.05vw, 16px);
      font-weight: 700;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      overflow-wrap: anywhere;
    }
    .hand-stat-delta {
      margin-left: 0;
      font-size: 12px;
      font-weight: 700;
    }
    .hand-stat-prefix {
      color: var(--muted);
    }
    .hand-stat-sub {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .mmr-suffix {
      font-size: 0.75em;
      color: var(--muted);
    }
    .stat-tooltip {
      position: fixed;
      z-index: 60;
      pointer-events: none;
      max-width: none;
      border: 1px solid var(--table-border);
      border-radius: 8px;
      background: rgba(37, 43, 60, 0.96);
      color: #d7def5;
      font-size: 12px;
      line-height: 1.35;
      white-space: pre-line;
      padding: 8px 9px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      display: none;
    }
    .stat-tooltip p {
      margin: 0;
    }
    .stat-tooltip strong {
      font-weight: 800;
    }
    .stat-tooltip.score-good {
      color: var(--green);
      border-color: rgba(80, 250, 123, 0.55);
    }
    .stat-tooltip.score-bad {
      color: var(--red);
      border-color: rgba(255, 85, 85, 0.55);
    }
    .stat-tooltip.score-mid {
      color: var(--yellow);
      border-color: rgba(241, 250, 140, 0.55);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      border: 1px solid var(--table-border);
      background: var(--table-bg);
    }
    .games-table-wrap {
      max-height: none;
      overflow: auto;
      border: 1px solid var(--table-border);
      border-radius: 8px;
    }
    .games-table-wrap table {
      border: none;
      border-radius: 0;
    }
    .filtered-table-wrap {
      max-height: none;
      overflow: auto;
      border: 1px solid var(--table-border);
      border-radius: 8px;
    }
    .filtered-table-wrap table {
      border: none;
      border-radius: 0;
    }
    .filtered-deals-table {
      width: max-content;
      min-width: 100%;
      table-layout: auto;
    }
    .filtered-deals-table .cards {
      white-space: nowrap;
    }
    .filtered-table-wrap thead th {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .games-table-wrap .score-header th {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    th, td {
      border-bottom: 1px solid var(--table-border);
      padding: 6px 8px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      color: #d7def5;
      font-weight: 600;
      font-size: 12px;
      background: var(--table-head-bg);
    }
    tbody tr { background: var(--table-bg); }
    tbody tr:nth-child(even) { background: var(--table-bg-alt); }
    .clickable { cursor: pointer; color: var(--accent); }
    .clickable:hover { text-decoration: underline; }
    .game-row { cursor: pointer; }
    .game-row:hover td { background: rgba(139, 233, 253, 0.08); }
    .game-row.selected td {
      background: rgba(139, 233, 253, 0.18);
      box-shadow: inset 0 1px 0 rgba(139, 233, 253, 0.22), inset 0 -1px 0 rgba(139, 233, 253, 0.22);
    }
    .game-row.selected td:first-child {
      box-shadow: inset 3px 0 0 var(--accent), inset 0 1px 0 rgba(139, 233, 253, 0.22), inset 0 -1px 0 rgba(139, 233, 253, 0.22);
    }
    .deal { margin-bottom: 12px; border: 1px solid var(--table-border); border-radius: 10px; overflow: hidden; background: var(--table-bg); }
    .deal-head { background: var(--table-head-bg); padding: 8px 10px; font-weight: 700; }
    .deals-table {
      width: max-content;
      min-width: 100%;
      table-layout: auto;
    }
    .deals-table .col-decision { width: auto; }
    .deals-table th, .deals-table td { white-space: normal; overflow-wrap: anywhere; }
    .deals-table .cards { white-space: nowrap; }
    .filtered-deals-table .cards .cards-list,
    .deals-table .cards .cards-list {
      flex-wrap: nowrap;
    }
    .deal-tricks {
      border-top: 1px solid var(--table-border);
      padding: 6px 8px 8px;
      background: rgba(37, 43, 60, 0.35);
    }
    .deal-tricks-title {
      margin: 0 0 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 700;
    }
    .deal-tricks-grid {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
    }
    .trick-card {
      flex: 1 1 0;
      min-width: 0;
      border: 1px solid var(--table-border);
      border-radius: 8px;
      background: var(--table-bg-alt);
      padding: 6px;
    }
    .trick-head {
      margin-bottom: 6px;
      font-size: 11px;
      font-weight: 700;
    }
    .trick-plays {
      display: grid;
      gap: 4px;
    }
    .trick-play {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      padding: 4px 6px;
      border: 1px solid rgba(126, 138, 168, 0.35);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.03);
    }
    .trick-play.is-winner {
      border-color: rgba(139, 233, 253, 0.75);
      background: rgba(139, 233, 253, 0.12);
      box-shadow: inset 0 0 0 1px rgba(139, 233, 253, 0.18);
    }
    .trick-play-label {
      min-width: 0;
      font-size: 11px;
      color: #d7def5;
      overflow-wrap: anywhere;
    }
    .trick-play.is-winner .trick-play-label {
      color: var(--accent);
      font-weight: 700;
    }
    .trick-play-card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .cards-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      min-height: 26px;
    }
    .talon-card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
      border: 1px solid rgba(139, 233, 253, 0.65);
      border-style: dashed;
      border-radius: 6px;
      background: rgba(139, 233, 253, 0.08);
    }
    .discarded-card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
      border-radius: 6px;
    }
    .discarded-card .card-img,
    .discarded-card .card-text-fallback {
      opacity: 0.5;
    }
    .talon-card.discarded-card {
      border-color: rgba(139, 233, 253, 0.65);
      background: rgba(139, 233, 253, 0.08);
    }
    .card-img {
      width: 22px;
      height: 32px;
      object-fit: contain;
      flex: 0 0 auto;
    }
    .card-text-fallback {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: #d7def5;
      padding: 2px 4px;
      border: 1px solid rgba(126, 138, 168, 0.35);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.03);
      white-space: nowrap;
    }
    .heart, .diamond { color: var(--red); font-weight: 700; }
    .muted { color: var(--muted); }
    .empty { color: var(--muted); font-style: italic; padding: 10px 2px; }
    .pill {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid var(--table-border);
      background: var(--table-bg-alt);
      font-size: 12px;
    }
    .score-total td {
      font-weight: 700;
      border-top: 2px solid var(--table-border);
      border-bottom: 2px solid var(--table-border);
      background: var(--table-total-bg);
    }
    .score-header th { white-space: nowrap; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable.active { color: var(--accent); }
    .col-game { white-space: nowrap; }
    .col-center { text-align: center; white-space: nowrap; }
    .col-decision { text-align: left; white-space: nowrap; width: 120px; }
    .suit-red { color: var(--red); font-weight: 700; }
    .score-good { color: var(--green); font-weight: 700; }
    .score-bad { color: var(--red); font-weight: 700; }
    .score-mid { color: var(--orange); font-weight: 700; }
    .score-even { color: var(--yellow); font-weight: 700; }
    .scroll-top-button {
      position: fixed;
      left: 65.5px;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 70;
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--table-border);
      border-radius: 999px;
      background: rgba(37, 43, 60, 0.94);
      color: var(--accent);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      padding: 0;
      font-size: 20px;
      line-height: 1;
      font-weight: 700;
    }
    .scroll-top-button[hidden] {
      display: none;
    }
    .compare-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 10px 0 14px;
    }
    .compare-toggle {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--table-border);
      border-radius: 8px;
      background: var(--table-bg-alt);
      color: var(--text);
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
    }
    .compare-toggle:hover { border-color: var(--accent); }
    .compare-toggle.is-active {
      border-color: var(--accent);
      background: rgba(139, 233, 253, 0.12);
      color: var(--accent);
    }
    .compare-view-header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .compare-view-header h2 { margin: 0; font-size: 18px; }
    .compare-title-row {
      padding-top: 8px;
      margin-bottom: 10px;
    }
    .compare-title {
      margin: 0;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .compare-close {
      margin-left: auto;
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid var(--table-border);
      border-radius: 999px;
      background: rgba(37, 43, 60, 0.94);
      color: var(--accent);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .compare-close.compare-floating-close {
      position: fixed;
      z-index: 80;
      margin-left: 0;
    }
    .compare-close:hover { border-color: var(--accent); }
    .compare-table-outer {
      text-align: center;
    }
    .compare-table-wrap {
      overflow: visible;
      border: 1px solid var(--table-border);
      border-radius: 8px;
      display: inline-block;
      max-width: 100%;
      vertical-align: top;
      text-align: left;
    }
    .compare-table {
      width: auto;
      border-collapse: collapse;
      font-size: 13px;
      background: var(--table-bg);
    }
    .compare-table tbody td:not(.stat-label),
    .compare-table thead th:not(:first-child) {
      text-align: right;
      white-space: nowrap;
    }
    .compare-table th, .compare-table td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--table-border);
      text-align: left;
      vertical-align: middle;
    }
    .compare-table thead th {
      background: var(--table-head-bg);
      color: #d7def5;
      font-weight: 600;
      font-size: 12px;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .compare-table tbody tr:nth-child(even) { background: var(--table-bg-alt); }
    .compare-table .stat-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      white-space: nowrap;
      width: 1%;
    }
    .compare-table thead th:first-child { width: 1%; white-space: nowrap; }
    .compare-table .section-row td {
      background: var(--table-total-bg);
      color: var(--accent);
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .compare-table td.compare-best {
      box-shadow: inset 3px 0 0 var(--green);
    }
    .compare-table td.compare-mid {
      box-shadow: inset 3px 0 0 var(--orange);
    }
    .compare-table td.compare-worst {
      box-shadow: inset 3px 0 0 var(--red);
    }
    .compare-empty {
      color: var(--muted);
      font-style: italic;
      padding: 14px 2px 14px 56px;
    }
    .compare-empty.compare-empty-inline {
      padding: 0;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--line); max-height: 36vh; }
      .summary-cards { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .summary-cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 460px) {
      .summary-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar">
      <h1 id="app-title" class="app-title" title="Clear selection">
        <span class="app-title-top">
          <span class="app-title-main">PREFERANS</span>
          <span class="app-title-pro-wrap">
            <span class="app-title-pro">PRO</span>
            <span class="app-title-pro-line" aria-hidden="true"></span>
          </span>
        </span>
        <span class="app-title-sub">PREFBUFF</span>
      </h1>
      <div class="compare-controls">
        <button id="compare-toggle" class="compare-toggle" type="button">Overview</button>
      </div>
      <div id="users"></div>
    </aside>
    <main class="main">
      <div id="content" class="section">
        <div class="empty">Select a user to view games and deals.</div>
      </div>
    </main>
  </div>
  <div id="stat-tooltip" class="stat-tooltip"></div>
  <button id="scroll-top-button" class="scroll-top-button" type="button" aria-label="Scroll to top" title="Scroll to top" hidden>⬆</button>

  <script>
    const state = {
      users: [],
      selectedUserId: null,
      selectedGameId: null,
      selectedGameDisplayId: null,
      scoreSortKey: "game",
      scoreSortDir: "desc",
      filteredDealsSortKey: "game",
      filteredDealsSortDir: "desc",
      games: [],
      gameDetails: null,
      gameDetailsMessage: "",
      handStats: null,
      handStatsCacheKey: "",
      handStatsLoading: false,
      handStatsError: "",
      handMatches: { hands: [], akq: [], akqj: [], aces3: [], miser: [], declarer: [], pass: [], passing: [], passingZero: [], whist: [] },
      activeHandFilter: "",
      pendingGameScrollId: null,
      opponentHandStats: {},
      analysisByUser: {},
      analysisLoadingFor: null,
      analysisErrorFor: null,
      analysisError: "",
      analysisCollapsed: false,
      comparisonMode: false,
      comparisonSelectedUserIds: [],
      comparisonData: null,
      comparisonLoading: false,
      comparisonError: "",
      comparisonCacheKey: ""
    };
    const VIEW_STATE_KEY = "prefbuff_view_state_v1";
    let refreshTimer = null;
    let refreshInFlight = false;
    let lastDataVersion = null;

    async function fetchDataVersion() {
      try {
        const res = await fetch("api/version", { cache: "no-store" });
        if (!res.ok) return null;
        const body = await res.json();
        return body && body.version !== undefined ? body.version : null;
      } catch (_) {
        return null;
      }
    }
    const statTooltipEl = document.getElementById("stat-tooltip");

    function esc(v) {
      return String(v ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function renderInlineMarkdown(line) {
      let s = esc(line);
      s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      s = s.replace(/(^|[\s(])\*([^*\n]+)\*/g, "$1<em>$2</em>");
      s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
      return s;
    }

    function renderMarkdown(text) {
      const lines = String(text ?? "").replace(/\r\n/g, "\n").split("\n");
      const out = [];
      let inList = false;
      let paragraph = [];
      const flushParagraph = () => {
        if (paragraph.length) {
          out.push(`<p>${paragraph.map(renderInlineMarkdown).join("<br>")}</p>`);
          paragraph = [];
        }
      };
      const closeList = () => {
        if (inList) {
          out.push("</ul>");
          inList = false;
        }
      };
      for (const rawLine of lines) {
        const line = rawLine.replace(/\s+$/, "");
        if (line.trim() === "") {
          flushParagraph();
          closeList();
          continue;
        }
        if (/^\s*(?:---+|\*\*\*+|___+)\s*$/.test(line)) {
          flushParagraph();
          closeList();
          out.push("<hr>");
          continue;
        }
        const h = /^(#{1,6})\s+(.*)$/.exec(line);
        if (h) {
          flushParagraph();
          closeList();
          const lvl = h[1].length;
          out.push(`<h${lvl}>${renderInlineMarkdown(h[2])}</h${lvl}>`);
          continue;
        }
        const b = /^\s*[-*]\s+(.*)$/.exec(line);
        if (b) {
          flushParagraph();
          if (!inList) { out.push("<ul>"); inList = true; }
          out.push(`<li>${renderInlineMarkdown(b[1])}</li>`);
          continue;
        }
        closeList();
        paragraph.push(line);
      }
      flushParagraph();
      closeList();
      return out.join("\n");
    }

    function normalizeCard(rawName) {
      const text = String(rawName ?? "").trim();
      const [rankRaw, suitRaw] = text.split("_of_");
      const rankKey = String(rankRaw ?? "").toLowerCase();
      const suitKey = String(suitRaw ?? "").toLowerCase();
      const rankPrettyMap = {
        ace: "A", a: "A",
        king: "K", k: "K",
        queen: "Q", q: "Q",
        jack: "J", j: "J",
        ten: "10", "10": "10", t: "10",
        nine: "9", "9": "9",
        eight: "8", "8": "8",
        seven: "7", "7": "7",
      };
      const suitPrettyMap = {
        spades: "♠", spade: "♠", s: "♠", "♠": "♠",
        diamonds: "♦", diamond: "♦", d: "♦", "♦": "♦",
        clubs: "♣", club: "♣", c: "♣", "♣": "♣",
        hearts: "♥", heart: "♥", h: "♥", "♥": "♥",
      };
      return {
        rank: rankPrettyMap[rankKey] ?? rankRaw ?? "",
        suit: suitPrettyMap[suitKey] ?? suitRaw ?? "",
      };
    }

    function cardPretty(name) {
      if (!name) return "";
      const { rank, suit } = normalizeCard(name);
      const suitHtml = (suit === "♥" || suit === "♦")
        ? `<span class="suit-red">${esc(suit)}</span>`
        : esc(suit);
      return `${esc(rank)}${suitHtml}`;
    }

    function sortCardNames(cards) {
      const suitOrder = { "♠": 1, "♦": 2, "♣": 3, "♥": 4 };
      const rankOrder = { "7": 1, "8": 2, "9": 3, "10": 4, J: 5, Q: 6, K: 7, A: 8 };
      return [...cards].sort((a, b) => {
        const lhs = normalizeCard(a);
        const rhs = normalizeCard(b);
        const s = (suitOrder[lhs.suit] ?? 99) - (suitOrder[rhs.suit] ?? 99);
        if (s) return s;
        return (rankOrder[lhs.rank] ?? 99) - (rankOrder[rhs.rank] ?? 99);
      });
    }

    function cardsHtml(cards) {
      return `<span class="cards-list">${sortCardNames(cards).map(cardImageHtml).join("")}</span>`;
    }

    function buildCardCountMap(cards) {
      const counts = new Map();
      for (const card of (Array.isArray(cards) ? cards : [])) {
        counts.set(card, (counts.get(card) || 0) + 1);
      }
      return counts;
    }

    function takeFromCountMap(counts, card) {
      const remaining = counts.get(card) || 0;
      if (remaining <= 0) return false;
      if (remaining === 1) {
        counts.delete(card);
      } else {
        counts.set(card, remaining - 1);
      }
      return true;
    }

    function dealCardsHtml(cards, talonCards = [], discardedCards = []) {
      const discardedCounts = buildCardCountMap(discardedCards);
      const taggedCards = [
        ...(Array.isArray(cards) ? cards : []).map((name, idx) => ({ name, isTalon: false, isDiscarded: false, idx })),
        ...(Array.isArray(talonCards) ? talonCards : []).map((name, idx) => ({ name, isTalon: true, isDiscarded: false, idx })),
      ];
      const suitOrder = { "♠": 1, "♦": 2, "♣": 3, "♥": 4 };
      const rankOrder = { "7": 1, "8": 2, "9": 3, "10": 4, J: 5, Q: 6, K: 7, A: 8 };
      for (const card of taggedCards) {
        if (takeFromCountMap(discardedCounts, card.name)) {
          card.isDiscarded = true;
        }
      }
      taggedCards.sort((a, b) => {
        const lhs = normalizeCard(a.name);
        const rhs = normalizeCard(b.name);
        const s = (suitOrder[lhs.suit] ?? 99) - (suitOrder[rhs.suit] ?? 99);
        if (s) return s;
        const r = (rankOrder[lhs.rank] ?? 99) - (rankOrder[rhs.rank] ?? 99);
        if (r) return r;
        if (a.isTalon !== b.isTalon) return a.isTalon ? 1 : -1;
        return a.idx - b.idx;
      });
      return `<span class="cards-list">${taggedCards.map(card => {
        const html = cardImageHtml(card.name);
        if (!card.isTalon && !card.isDiscarded) return html;
        const classes = [
          card.isTalon ? "talon-card" : "",
          card.isDiscarded ? "discarded-card" : "",
        ].filter(Boolean).join(" ");
        const title = card.isTalon && card.isDiscarded
          ? "Talon card, then discarded"
          : (card.isTalon ? "Talon card" : "Discarded card");
        return `<span class="${classes}" title="${title}">${html}</span>`;
      }).join("")}</span>`;
    }

    function trickPlayLabel(playerId) {
      return playerId ? nameByPlayerId(playerId) : "Talon";
    }

    function dealTricksHtml(deal) {
      const tricks = Array.isArray(deal?.trick_history) ? deal.trick_history : [];
      if (tricks.length === 0) {
        return ``;
      }
      return `
        <div class="deal-tricks">
          <div class="deal-tricks-title">Tricks</div>
          <div class="deal-tricks-grid">
            ${tricks.map((trick, index) => {
              const winnerId = String(trick?.winner_player_id || "");
              const plays = Array.isArray(trick?.plays) ? [...trick.plays] : [];
              plays.sort((lhs, rhs) => {
                const lhsIsTalon = !String(lhs?.player_id || "");
                const rhsIsTalon = !String(rhs?.player_id || "");
                if (lhsIsTalon === rhsIsTalon) return 0;
                return lhsIsTalon ? -1 : 1;
              });
              return `
                <div class="trick-card">
                  <div class="trick-head">Trick ${index + 1}</div>
                  <div class="trick-plays">
                    ${plays.map(play => {
                      const playerId = String(play?.player_id || "");
                      const isWinner = winnerId !== "" && playerId === winnerId;
                      return `
                        <div class="trick-play ${isWinner ? "is-winner" : ""}">
                          <div class="trick-play-label">${esc(trickPlayLabel(playerId))}</div>
                          <div class="trick-play-card">${cardImageHtml(play?.card || "")}</div>
                        </div>
                      `;
                    }).join("")}
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function cardAssetName(name) {
      const text = String(name ?? "").trim();
      if (!text.includes("_of_")) return null;
      const [rankRaw, suitRaw] = text.split("_of_");
      const rankKey = String(rankRaw ?? "").toLowerCase();
      const suitKey = String(suitRaw ?? "").toLowerCase();
      const rankFileMap = {
        ace: "ace",
        king: "king",
        queen: "queen",
        jack: "jack",
        ten: "10",
        "10": "10",
        nine: "9",
        "9": "9",
        eight: "8",
        "8": "8",
        seven: "7",
        "7": "7",
      };
      const suitFileMap = {
        spades: "spades",
        spade: "spades",
        diamonds: "diamonds",
        diamond: "diamonds",
        clubs: "clubs",
        club: "clubs",
        hearts: "hearts",
        heart: "hearts",
      };
      const rank = rankFileMap[rankKey];
      const suit = suitFileMap[suitKey];
      if (!rank || !suit) return null;
      return `${rank}_of_${suit}.png`;
    }

    function cardImageHtml(name) {
      const filename = cardAssetName(name);
      if (!filename) {
        return `<span class="card-text-fallback">${cardPretty(name)}</span>`;
      }
      return `<img class="card-img" loading="lazy" src="/assets/cards/${encodeURIComponent(filename)}" alt="${esc(String(name))}" />`;
    }

    function formatCompactNumber(value) {
      const n = Number(value || 0);
      const abs = Math.abs(n);
      if (abs < 10000) return `${(n / 1000).toFixed(1)}k`;
      return `${Math.round(n / 1000)}k`;
    }

    function formatDuration(totalSec) {
      const sec = Math.max(0, Number(totalSec || 0));
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0) return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function formatDateTime(epochSec) {
      const d = new Date(Number(epochSec || 0) * 1000);
      const date = d.toLocaleDateString("en-US", {
        timeZone: "UTC",
        month: "2-digit",
        day: "2-digit",
        year: "numeric"
      });
      const time = d.toLocaleTimeString("en-US", {
        // Game timestamps are currently stored as local wall-clock seconds.
        // Format them in UTC here to avoid applying the browser timezone twice.
        timeZone: "UTC",
        hour: "2-digit",
        minute: "2-digit",
        hour12: true
      });
      return { date, time };
    }

    function nameByPlayerId(playerId) {
      const user = state.users.find(u => u.player_id === playerId);
      return user?.player_name || playerId;
    }

    function normalizeContract(contract) {
      const text = String(contract ?? "").trim();
      return (text === "" || text === "-") ? "Pass" : text;
    }

    function isMiserContract(contract) {
      const key = String(contract ?? "").trim().toLowerCase().replaceAll(" ", "");
      return (
        key.includes("misère") ||
        key.includes("miser") ||
        key.includes("мизер") ||
        key.includes("mis.wt") ||
        key.includes("miswt")
      );
    }

    function isPassDecision(value) {
      const text = String(value ?? "").trim();
      const key = text.toLowerCase();
      return text === "-" || key === "pass";
    }

    function allPlayersPassed(deal) {
      const playerIds = Object.keys(deal?.hands || {});
      if (playerIds.length === 0) return false;
      return playerIds.every(pid => {
        const rawDecision = deal?.decisions?.[pid] ?? (pid === deal?.declarer_id ? deal?.contract : "");
        return isPassDecision(rawDecision);
      });
    }

    function bidHtml(text) {
      const normalized = normalizeContract(text);
      const safe = esc(normalized);
      return safe
        .replaceAll("♥", `<span class="suit-red">♥</span>`)
        .replaceAll("♦", `<span class="suit-red">♦</span>`);
    }

    async function api(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${path}`);
      return await res.json();
    }

    function saveViewState() {
      try {
        localStorage.setItem(VIEW_STATE_KEY, JSON.stringify({
          selectedUserId: state.selectedUserId,
          selectedGameId: state.selectedGameId,
          scoreSortKey: state.scoreSortKey,
          scoreSortDir: state.scoreSortDir,
          filteredDealsSortKey: state.filteredDealsSortKey,
          filteredDealsSortDir: state.filteredDealsSortDir,
          analysisCollapsed: state.analysisCollapsed,
          comparisonMode: state.comparisonMode,
          comparisonSelectedUserIds: state.comparisonSelectedUserIds,
        }));
      } catch (_) {}
    }

    function loadViewState() {
      try {
        const raw = localStorage.getItem(VIEW_STATE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        state.selectedUserId = parsed?.selectedUserId ?? null;
        state.selectedGameId = Number.isInteger(parsed?.selectedGameId) ? parsed.selectedGameId : null;
        state.scoreSortKey = parsed?.scoreSortKey || "game";
        state.scoreSortDir = (parsed?.scoreSortDir === "asc" || parsed?.scoreSortDir === "desc") ? parsed.scoreSortDir : "desc";
        state.filteredDealsSortKey = parsed?.filteredDealsSortKey || "game";
        state.filteredDealsSortDir = (parsed?.filteredDealsSortDir === "asc" || parsed?.filteredDealsSortDir === "desc") ? parsed.filteredDealsSortDir : "desc";
        state.analysisCollapsed = Boolean(parsed?.analysisCollapsed);
        state.comparisonMode = Boolean(parsed?.comparisonMode);
        state.comparisonSelectedUserIds = Array.isArray(parsed?.comparisonSelectedUserIds)
          ? parsed.comparisonSelectedUserIds.filter(v => typeof v === "string")
          : [];
      } catch (_) {}
    }

    function applySelectedUserIdFromUrl() {
      try {
        const url = new URL(window.location.href);
        const selectedUserId = url.searchParams.get("selectedUserId");
        if (!selectedUserId) return { selectedUserFromUrl: false, selectLatestGame: false };
        const selectLatestGame = url.searchParams.get("selectLatestGame") === "1";
        state.selectedUserId = selectedUserId;
        state.selectedGameId = null;
        state.selectedGameDisplayId = null;
        url.searchParams.delete("selectedUserId");
        url.searchParams.delete("selectLatestGame");
        window.history.replaceState({}, "", url.pathname + url.search + url.hash);
        return { selectedUserFromUrl: true, selectLatestGame };
      } catch (_) {}
      return { selectedUserFromUrl: false, selectLatestGame: false };
    }

    function latestGameId(games) {
      let latest = null;
      for (const g of (Array.isArray(games) ? games : [])) {
        const id = Number(g?.id || 0);
        const timestamp = Number(g?.timestamp || 0);
        if (!Number.isFinite(id)) continue;
        if (!latest || timestamp > latest.timestamp || (timestamp === latest.timestamp && id > latest.id)) {
          latest = { id, timestamp };
        }
      }
      return latest ? latest.id : null;
    }

    function syncSelectedGameDisplayId() {
      if (state.selectedGameId === null) {
        state.selectedGameDisplayId = null;
        return;
      }
      const row = buildScoreRows(state.games).find(r => r.id === state.selectedGameId);
      state.selectedGameDisplayId = row ? row.displayId : null;
    }

    function resetHandStats() {
      state.handStats = null;
      state.handStatsCacheKey = "";
      state.handStatsLoading = false;
      state.handStatsError = "";
      state.handMatches = { hands: [], akq: [], akqj: [], aces3: [], miser: [], declarer: [], pass: [], passing: [], passingZero: [], whist: [] };
    }

    function hasSuitedRanksInHand(cards, requiredRanks) {
      const bySuit = { "♠": [], "♦": [], "♣": [], "♥": [] };
      for (const c of (Array.isArray(cards) ? cards : [])) {
        const n = normalizeCard(c);
        if (bySuit[n.suit]) bySuit[n.suit].push(n.rank);
      }
      return Object.values(bySuit).some(ranks => requiredRanks.every(r => ranks.includes(r)));
    }

    function collectAkqMatchesForPlayer(playerId, gameDetailsList) {
      const gameMetaById = new Map(state.games.map(g => [Number(g.id), g]));
      const gameRowsById = new Map(buildScoreRows(state.games).map(r => [Number(r.id), r]));
      const decisionPlayerName = nameByPlayerId(playerId);
      const matches = [];
      for (const game of gameDetailsList) {
        const gameId = Number(game?.id || 0);
        const gameMeta = gameMetaById.get(gameId);
        const gameRow = gameRowsById.get(gameId);
        const dt = formatDateTime(gameMeta?.timestamp || 0);
        const deals = Array.isArray(game?.deals) ? game.deals : [];
        for (const deal of deals) {
          const cards = deal?.hands?.[playerId];
          if (!Array.isArray(cards) || cards.length === 0) continue;
          if (!hasSuitedRanksInHand(cards, ["A", "K", "Q"])) continue;
          const rawDecision = deal?.decisions?.[playerId] ?? (deal?.declarer_id === playerId ? deal?.contract : "");
          matches.push({
            gameId,
            gameDisplayId: Number(gameRow?.displayId || gameId),
            dealId: Number(deal?.id || 0),
            date: dt.date,
            time: dt.time,
            contract: deal?.contract || "",
            declarerId: String(deal?.declarer_id || ""),
            declarerName: deal?.declarer_name || deal?.declarer_id || "-",
            decision: normalizeContract(rawDecision),
            decisionPlayerName,
            tricks: Number(deal?.tricks?.[playerId] || 0),
            dump: Number(deal?.scores?.[playerId]?.dump || 0),
            pool: Number(deal?.scores?.[playerId]?.pool || 0),
            whists: Number(deal?.scores?.[playerId]?.whists || 0),
            dpw: `${Number(deal?.scores?.[playerId]?.dump || 0)}/${Number(deal?.scores?.[playerId]?.pool || 0)}/${Number(deal?.scores?.[playerId]?.whists || 0)}`,
            mmr: Number(deal?.scores?.[playerId]?.mmr || 0),
            cards,
            talon: Array.isArray(deal?.talon) ? deal.talon : [],
            discardedCards: Array.isArray(deal?.discarded_cards) ? deal.discarded_cards : [],
            decisionText: String(rawDecision ?? "").trim()
          });
        }
      }
      return matches.sort((a, b) => {
        if (b.gameId !== a.gameId) return b.gameId - a.gameId;
        return b.dealId - a.dealId;
      });
    }

    function collectMatchesForPlayer(playerId, gameDetailsList, matchFn) {
      const gameMetaById = new Map(state.games.map(g => [Number(g.id), g]));
      const gameRowsById = new Map(buildScoreRows(state.games).map(r => [Number(r.id), r]));
      const decisionPlayerName = nameByPlayerId(playerId);
      const matches = [];
      for (const game of gameDetailsList) {
        const gameId = Number(game?.id || 0);
        const gameMeta = gameMetaById.get(gameId);
        const gameRow = gameRowsById.get(gameId);
        const dt = formatDateTime(gameMeta?.timestamp || 0);
        const deals = Array.isArray(game?.deals) ? game.deals : [];
        for (const deal of deals) {
          const cards = deal?.hands?.[playerId];
          if (!Array.isArray(cards) || cards.length === 0) continue;
          if (!matchFn(cards, deal, playerId)) continue;
          const rawDecision = deal?.decisions?.[playerId] ?? (deal?.declarer_id === playerId ? deal?.contract : "");
          const decisionText = String(rawDecision ?? "").trim();
          const decisionKey = decisionText.toLowerCase();
          matches.push({
            gameId,
            gameDisplayId: Number(gameRow?.displayId || gameId),
            dealId: Number(deal?.id || 0),
            date: dt.date,
            time: dt.time,
            contract: deal?.contract || "",
            declarerId: String(deal?.declarer_id || ""),
            declarerName: deal?.declarer_name || deal?.declarer_id || "-",
            decision: normalizeContract(rawDecision),
            decisionPlayerName,
            decisionText,
            decisionKey,
            tricks: Number(deal?.tricks?.[playerId] || 0),
            dump: Number(deal?.scores?.[playerId]?.dump || 0),
            pool: Number(deal?.scores?.[playerId]?.pool || 0),
            whists: Number(deal?.scores?.[playerId]?.whists || 0),
            dpw: `${Number(deal?.scores?.[playerId]?.dump || 0)}/${Number(deal?.scores?.[playerId]?.pool || 0)}/${Number(deal?.scores?.[playerId]?.whists || 0)}`,
            mmr: Number(deal?.scores?.[playerId]?.mmr || 0),
            cards,
            talon: Array.isArray(deal?.talon) ? deal.talon : [],
            discardedCards: Array.isArray(deal?.discarded_cards) ? deal.discarded_cards : []
          });
        }
      }
      return matches.sort((a, b) => {
        if (b.gameId !== a.gameId) return b.gameId - a.gameId;
        return b.dealId - a.dealId;
      });
    }

    async function loadSelectedGameDetails() {
      if (state.selectedGameId === null) {
        state.gameDetails = null;
        state.gameDetailsMessage = "";
        return;
      }
      try {
        state.gameDetails = await api(`api/games/${state.selectedGameId}`);
        if (!Array.isArray(state.gameDetails?.deals) || state.gameDetails.deals.length === 0) {
          state.gameDetailsMessage = `No deal data for game ${state.selectedGameDisplayId ?? state.selectedGameId}.`;
        } else {
          state.gameDetailsMessage = "";
        }
      } catch (_) {
        state.gameDetails = null;
        state.gameDetailsMessage = `No deal data for game ${state.selectedGameDisplayId ?? state.selectedGameId}.`;
      }
    }

    function percentText(value, total) {
      if (!total) return "0.0%";
      return `${((value * 100) / total).toFixed(1)}%`;
    }

    function profitabilityRateText(positiveMmr, negativeAbsMmr) {
      const totalAbsMmr = positiveMmr + negativeAbsMmr;
      if (!totalAbsMmr) return "0.0%";
      return `${((positiveMmr * 100) / totalAbsMmr).toFixed(1)}%`;
    }

    function computeHandStatsForPlayer(playerId, gameDetailsList) {
      const suitOrder = ["♠", "♦", "♣", "♥"];
      let handsCount = 0;
      let decisiveHandsCount = 0;
      let dealsPositive = 0;
      let dealsNegative = 0;
      let dealsMmrSum = 0;
      let hcpTotal = 0;
      let cardPointsTotal = 0;
      const mkCat = () => ({ count: 0, positive: 0, negative: 0, mmrSum: 0, positiveMmr: 0, negativeAbsMmr: 0 });
      const addCat = (b, mmr) => {
        b.count += 1;
        b.mmrSum += mmr;
        if (mmr > 0) {
          b.positive += 1;
          b.positiveMmr += mmr;
        } else if (mmr < 0) {
          b.negative += 1;
          b.negativeAbsMmr += Math.abs(mmr);
        }
      };
      const declarer = mkCat();
      const miser = mkCat();
      const pass = mkCat();
      const whist = mkCat();
      const passing = mkCat();
      const passingZero = mkCat();
      const akq = mkCat();
      const akqj = mkCat();
      const aces3 = mkCat();
      let declarerTalonHcpTotal = 0;
      let decisionSamples = 0;
      const declaredByLevel = { 6: 0, 7: 0, 8: 0, 9: 0, 10: 0 };
      const declaredCategoryByLevel = { 6: mkCat(), 7: mkCat(), 8: mkCat(), 9: mkCat(), 10: mkCat() };

      const contractLevelDigit = (contract) => {
        const text = String(contract ?? "").trim();
        if (text.startsWith("10")) return 10;
        if (text.startsWith("9")) return 9;
        if (text.startsWith("8")) return 8;
        if (text.startsWith("7")) return 7;
        if (text.startsWith("6")) return 6;
        return 0;
      };

      const hcpByRank = { A: 4, K: 3, Q: 2, J: 1 };
      const cardPointsByRank = { A: 8, K: 7, Q: 6, J: 5, "10": 4, "9": 3, "8": 2, "7": 1 };
      for (const game of gameDetailsList) {
        const deals = Array.isArray(game?.deals) ? game.deals : [];
        for (const deal of deals) {
          const cards = deal?.hands?.[playerId];
          if (!Array.isArray(cards) || cards.length === 0) continue;
          handsCount += 1;
          const dealMmr = Number(deal?.scores?.[playerId]?.mmr || 0);
          const isDraftDeal = dealMmr === 0;
          if (!isDraftDeal) decisiveHandsCount += 1;
          dealsMmrSum += dealMmr;
          if (dealMmr > 0) {
            dealsPositive += 1;
          } else if (dealMmr < 0) {
            dealsNegative += 1;
          }
          if (deal?.declarer_id === playerId) {
            addCat(declarer, dealMmr);
            if (isMiserContract(deal?.contract)) addCat(miser, dealMmr);
            const talon = Array.isArray(deal?.talon) ? deal.talon : [];
            let talonHcp = 0;
            for (const tc of talon) {
              const rank = normalizeCard(tc).rank;
              talonHcp += Number(hcpByRank[rank] || 0);
            }
            declarerTalonHcpTotal += talonHcp;
            const level = contractLevelDigit(deal?.contract);
            if (level >= 6 && level <= 10) {
              declaredByLevel[level] += 1;
              addCat(declaredCategoryByLevel[level], dealMmr);
            }
          }
          const rawDecision = deal?.decisions?.[playerId] ?? (deal?.declarer_id === playerId ? deal?.contract : "");
          const decisionText = String(rawDecision ?? "").trim();
          if (decisionText !== "") {
            decisionSamples += 1;
            const decisionKey = decisionText.toLowerCase();
            if (isPassDecision(rawDecision)) addCat(pass, dealMmr);
            if (decisionKey.includes("whist")) addCat(whist, dealMmr);
          }
          if (allPlayersPassed(deal)) {
            addCat(passing, dealMmr);
            if (Number(deal?.tricks?.[playerId] || 0) === 0) addCat(passingZero, dealMmr);
          }

          const bySuit = { "♠": [], "♦": [], "♣": [], "♥": [] };
          let aces = 0;
          let hcp = 0;
          let cardPoints = 0;
          for (const c of cards) {
            const n = normalizeCard(c);
            const suit = n.suit;
            const rank = n.rank;
            if (bySuit[suit]) bySuit[suit].push(rank);
            if (rank === "A") aces += 1;
            hcp += Number(hcpByRank[rank] || 0);
            cardPoints += Number(cardPointsByRank[rank] || 0);
          }
          hcpTotal += hcp;
          cardPointsTotal += cardPoints;

          const hasSuitRanks = (ranks, required) => required.every(r => ranks.includes(r));
          let handHasAKQ = false;
          let handHasAKQJ = false;
          for (const suit of suitOrder) {
            const ranks = bySuit[suit];
            if (hasSuitRanks(ranks, ["A", "K", "Q"])) {
              handHasAKQ = true;
            }
            if (hasSuitRanks(ranks, ["A", "K", "Q", "J"])) {
              handHasAKQJ = true;
            }
          }
          if (handHasAKQ) addCat(akq, dealMmr);
          if (handHasAKQJ) addCat(akqj, dealMmr);
          if (aces >= 3) addCat(aces3, dealMmr);
        }
      }

      return {
        handsCount,
        decisiveHandsCount,
        dealsPositive,
        dealsNegative,
        dealsMmrSum,
        avgHcp: handsCount ? (hcpTotal / handsCount) : 0,
        avgCardPoints: handsCount ? (cardPointsTotal / handsCount) : 0,
        avgDeclarerTalonHcp: declarer.count ? (declarerTalonHcpTotal / declarer.count) : 0,
        suitedAKQRate: handsCount ? ((akq.count * 100) / handsCount) : 0,
        suitedAKQJRate: handsCount ? ((akqj.count * 100) / handsCount) : 0,
        threePlusAcesRate: handsCount ? ((aces3.count * 100) / handsCount) : 0,
        suitedAKQPct: percentText(akq.count, handsCount),
        suitedAKQJPct: percentText(akqj.count, handsCount),
        threePlusAcesPct: percentText(aces3.count, handsCount),
        suitedAKQCategory: akq,
        suitedAKQJCategory: akqj,
        threePlusAcesCategory: aces3,
        declarerPct: percentText(declarer.count, handsCount),
        declarerMadePct: profitabilityRateText(declarer.positiveMmr, declarer.negativeAbsMmr),
        declarerCategory: declarer,
        miserCount: miser.count,
        miserPct: percentText(miser.count, handsCount),
        miserMadePct: profitabilityRateText(miser.positiveMmr, miser.negativeAbsMmr),
        miserCategory: miser,
        passRatePct: percentText(pass.count, decisionSamples),
        passMadePct: profitabilityRateText(pass.positiveMmr, pass.negativeAbsMmr),
        passCategory: pass,
        passingRatePct: percentText(passing.count, handsCount),
        passingMadePct: profitabilityRateText(passing.positiveMmr, passing.negativeAbsMmr),
        passingCategory: passing,
        whistRatePct: percentText(whist.count, decisionSamples),
        whistMadePct: profitabilityRateText(whist.positiveMmr, whist.negativeAbsMmr),
        whistCategory: whist,
        declared6Count: declaredByLevel[6],
        declared7Count: declaredByLevel[7],
        declared8Count: declaredByLevel[8],
        declared9Count: declaredByLevel[9],
        declared10Count: declaredByLevel[10],
        declared6Pct: percentText(declaredByLevel[6], handsCount),
        declared7Pct: percentText(declaredByLevel[7], handsCount),
        declared8Pct: percentText(declaredByLevel[8], handsCount),
        declared9Pct: percentText(declaredByLevel[9], handsCount),
        declared10Pct: percentText(declaredByLevel[10], handsCount),
        declared6MadePct: profitabilityRateText(declaredCategoryByLevel[6].positiveMmr, declaredCategoryByLevel[6].negativeAbsMmr),
        declared7MadePct: profitabilityRateText(declaredCategoryByLevel[7].positiveMmr, declaredCategoryByLevel[7].negativeAbsMmr),
        declared8MadePct: profitabilityRateText(declaredCategoryByLevel[8].positiveMmr, declaredCategoryByLevel[8].negativeAbsMmr),
        declared9MadePct: profitabilityRateText(declaredCategoryByLevel[9].positiveMmr, declaredCategoryByLevel[9].negativeAbsMmr),
        declared10MadePct: profitabilityRateText(declaredCategoryByLevel[10].positiveMmr, declaredCategoryByLevel[10].negativeAbsMmr),
        declared6Category: declaredCategoryByLevel[6],
        declared7Category: declaredCategoryByLevel[7],
        declared8Category: declaredCategoryByLevel[8],
        declared9Category: declaredCategoryByLevel[9],
        declared10Category: declaredCategoryByLevel[10],
        passingZeroTricksCount: passingZero.count,
        passingZeroTricksPct: percentText(passingZero.count, passing.count),
        passingZeroCategory: passingZero,
      };
    }

    async function loadHandStatsIfNeeded() {
      if (!state.selectedUserId) return;
      const cacheKey = `${state.selectedUserId}:${state.games.length}:${state.games[0]?.id || 0}`;
      if (state.handStatsCacheKey === cacheKey || state.handStatsLoading) return;
      state.handStatsLoading = true;
      state.handStatsError = "";
      renderMain();
      const userIdAtRequestStart = state.selectedUserId;
      try {
        const fetchWithTimeout = (path, ms) => new Promise(resolve => {
          let done = false;
          const timer = setTimeout(() => { if (!done) { done = true; resolve(null); } }, ms);
          api(path).then(v => { if (!done) { done = true; clearTimeout(timer); resolve(v); } })
                   .catch(() => { if (!done) { done = true; clearTimeout(timer); resolve(null); } });
        });
        const allGameDetails = await Promise.all(
          state.games.map(g => fetchWithTimeout(`api/games/${g.id}`, 15000))
        );
        if (state.selectedUserId !== userIdAtRequestStart) return;
        const valid = allGameDetails.filter(Boolean);
        state.handStats = computeHandStatsForPlayer(state.selectedUserId, valid);
        const allPlayerIds = new Set();
        for (const g of valid) {
          for (const d of (g?.deals || [])) {
            for (const pid of Object.keys(d?.hands || {})) allPlayerIds.add(pid);
          }
        }
        const opponentIds = [...allPlayerIds].filter(pid => pid !== state.selectedUserId);
        const opponentGamesLists = await Promise.all(
          opponentIds.map(pid => fetchWithTimeout(`api/users/${encodeURIComponent(pid)}/games`, 15000))
        );
        state.opponentHandStats = {};
        opponentIds.forEach((pid, i) => {
          const opponentUser = state.users.find(u => u.player_id === pid);
          const opponentGames = Array.isArray(opponentGamesLists[i]) ? opponentGamesLists[i] : [];
          state.opponentHandStats[pid] = {
            player_name: opponentUser?.player_name || pid,
            stats: computeHandStatsForPlayer(pid, valid),
            gameTotals: buildTotals(opponentGames),
          };
        });
        state.handMatches = {
          hands: collectMatchesForPlayer(state.selectedUserId, valid, () => true),
          akq: collectAkqMatchesForPlayer(state.selectedUserId, valid),
          akqj: collectMatchesForPlayer(state.selectedUserId, valid, cards => hasSuitedRanksInHand(cards, ["A", "K", "Q", "J"])),
          aces3: collectMatchesForPlayer(state.selectedUserId, valid, cards => {
            let aces = 0;
            for (const c of cards) {
              if (normalizeCard(c).rank === "A") aces += 1;
            }
            return aces >= 3;
          }),
          miser: collectMatchesForPlayer(state.selectedUserId, valid, (_cards, deal, playerId) => {
            if (deal?.declarer_id !== playerId) return false;
            return isMiserContract(deal?.contract);
          }),
          declarer: collectMatchesForPlayer(state.selectedUserId, valid, (_cards, deal, playerId) => deal?.declarer_id === playerId),
          pass: collectMatchesForPlayer(state.selectedUserId, valid, (_cards, deal, playerId) => {
            const rawDecision = deal?.decisions?.[playerId] ?? (deal?.declarer_id === playerId ? deal?.contract : "");
            return isPassDecision(rawDecision);
          }),
          passing: collectMatchesForPlayer(state.selectedUserId, valid, (_cards, deal) => {
            return allPlayersPassed(deal);
          }),
          passingZero: collectMatchesForPlayer(state.selectedUserId, valid, (_cards, deal, playerId) => {
            return allPlayersPassed(deal) && Number(deal?.tricks?.[playerId] || 0) === 0;
          }),
          whist: collectMatchesForPlayer(state.selectedUserId, valid, (_cards, deal, playerId) => {
            const rawDecision = deal?.decisions?.[playerId] ?? (deal?.declarer_id === playerId ? deal?.contract : "");
            const decisionKey = String(rawDecision ?? "").trim().toLowerCase();
            return decisionKey.includes("whist");
          }),
        };
      } catch (err) {
        if (state.selectedUserId === userIdAtRequestStart) {
          state.handStatsError = String(err?.message || err || "Failed to load hand stats.");
        }
      } finally {
        state.handStatsCacheKey = cacheKey;
        state.handStatsLoading = false;
        if (state.selectedUserId === userIdAtRequestStart) renderMain();
      }
    }

    async function generatePlayerAnalysis() {
      const userId = state.selectedUserId;
      if (!userId || !state.handStats) return;
      const user = state.users.find(u => u.player_id === userId);
      state.analysisLoadingFor = userId;
      state.analysisErrorFor = null;
      state.analysisError = "";
      renderMain();
      try {
        const stripStats = (stats) => {
          if (!stats) return stats;
          const {
            avgDeclarerTalonHcp: _o1, dealsMmrSum: _o2,
            suitedAKQRate,
            suitedAKQJRate,
            threePlusAcesRate,
            declarerMadePct,
            miserMadePct,
            passMadePct,
            passingMadePct,
            whistMadePct,
            ...rest
          } = stats;
          return {
            ...rest,
            declarerProfitabilityPct: declarerMadePct,
            miserProfitabilityPct: miserMadePct,
            passProfitabilityPct: passMadePct,
            passingProfitabilityPct: passingMadePct,
            whistProfitabilityPct: whistMadePct,
            suitedAKQPct: String(rest.suitedAKQPct || "0.0%"),
            suitedAKQJPct: String(rest.suitedAKQJPct || "0.0%"),
            threePlusAcesPct: String(rest.threePlusAcesPct || "0.0%"),
          };
        };
        const stripTotals = (t) => {
          if (!t) return t;
          const { totalDurationSec: _o1, avgDurationSec: _o2, totalDPW: _o3,
                  totalDuration: _o4, avgDuration: _o5, resultText: _o6,
                  profitabilityRate, ...rest } = t;
          return { ...rest, gameProfitabilityPct: String(profitabilityRate || "0.0%") };
        };
        const opponentsForLlm = {};
        for (const [pid, opponent] of Object.entries(state.opponentHandStats || {})) {
          opponentsForLlm[pid] = {
            ...opponent,
            stats: stripStats(opponent.stats),
            gameTotals: stripTotals(opponent.gameTotals),
          };
        }
        const res = await fetch("api/analysis", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({

        const data = await res.json().catch(() => ({}));

        state.analysisByUser[userId] = String(data?.text || "").trim();
      } catch (err) {
        state.analysisErrorFor = userId;
        state.analysisError = String(err?.message || err || "Failed to generate analysis.");
      } finally {
        if (state.analysisLoadingFor === userId) state.analysisLoadingFor = null;
        renderMain();
      }
    }

    async function selectGame(gameId, gameDisplayId = null) {

      state.selectedGameDisplayId = gameDisplayId !== null ? Number(gameDisplayId) : null;

          state.selectedUserId = el.dataset.userId;

      state.comparisonData = null;
      state.comparisonError = "";
