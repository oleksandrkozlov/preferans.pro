    function dealRows(deal) {
      const pids = Object.keys(deal.hands || {}).sort();
      const showSeparateTalonRow = allPlayersPassed(deal);
      const talonCards = Array.isArray(deal?.talon) ? deal.talon : [];
      const discardedCards = Array.isArray(deal?.discarded_cards) ? deal.discarded_cards : [];
      return pids.map(pid => {
        const rawDecision = deal.decisions?.[pid] ?? (pid === deal.declarer_id ? deal.contract : "");
        const decision = normalizeContract(rawDecision);
        const tricks = deal.tricks?.[pid] ?? 0;
        const score = deal.scores?.[pid] || {};
        const dpw = `${Number(score.dump || 0)}/${Number(score.pool || 0)}/${Number(score.whists || 0)}`;
        const mmr = Number(score.mmr || 0);
        const mmrText = `${mmr > 0 ? "+" : ""}${mmr}`;
        const cards = deal.hands[pid] || [];
        const rowTalonCards = !showSeparateTalonRow && pid === deal.declarer_id
          ? talonCards
          : [];
        const rowDiscardedCards = !showSeparateTalonRow && pid === deal.declarer_id
          ? discardedCards
          : [];
        return `
          <tr>
            <td>${esc(nameByPlayerId(pid))}</td>
            <td class="col-decision"><span class="pill">${bidHtml(decision)}</span></td>
            <td>${esc(tricks)}</td>
            <td>${esc(dpw)}</td>
            <td class="${scoreClass(mmrText)}">${esc(mmrText)}</td>
            <td class="cards">${dealCardsHtml(cards, rowTalonCards, rowDiscardedCards)}</td>
          </tr>
        `;
      }).join("");
    }

    function shouldShowSeparateTalonForMatch(match) {
      const isDeclarer = String(match?.declarerId || "") === String(state.selectedUserId || "");
      if (!isDeclarer) return true;
      return isPassDecision(match?.decisionText || match?.decision || "");
    }

    function averageCardPoints(cards) {
      const list = Array.isArray(cards) ? cards : [];
      if (list.length === 0) return 0;
      const hcpByRank = { A: 4, K: 3, Q: 2, J: 1 };
      let total = 0;
      for (const card of list) {
        total += Number(hcpByRank[normalizeCard(card).rank] || 0);
      }
      return total / list.length;
    }

    function averageVisibleCardsPointsForMatch(match) {
      const cards = Array.isArray(match?.cards) ? match.cards : [];
      if (shouldShowSeparateTalonForMatch(match)) {
        return averageCardPoints(cards);
      }
      const talon = Array.isArray(match?.talon) ? match.talon : [];
      return averageCardPoints([...cards, ...talon]);
    }

    function buildScoreRows(games) {
      const asc = [...games].sort((a, b) => a.id - b.id);
      let run = 0;
      const mmrDiffById = new Map();
      for (const g of asc) {
        run += Number(g.mmr || 0);
        mmrDiffById.set(g.id, run);
      }
      const desc = [...asc].reverse();
      return desc.map((g, idx) => {
        const mmr = Number(g.mmr || 0);
        const resultLabel = mmr === 0 ? "Draw" : (mmr > 0 ? "Win" : "Lost");
        const sign = mmr > 0 ? "+" : "";
        const result = `${resultLabel} (${sign}${mmr})`;
        const mmrTotal = Number(mmrDiffById.get(g.id) || 0);
        const mmrTotalText = mmrTotal > 0 ? `\u00A0${mmrTotal}` : String(mmrTotal);
        const { date, time } = formatDateTime(g.timestamp);
        return {
          id: g.id,
          displayId: desc.length - idx,
          timestamp: Number(g.timestamp || 0),
          date,
          time,
          durationSec: Number(g.duration || 0),
          duration: formatDuration(g.duration),
          mmr,
          result,
          mmrTotal,
          mmrTotalText,
          pool: Number(g.pool || 0),
          dump: Number(g.dump || 0),
          whists: Number(g.whists || 0),
          dpw: `${g.dump}/${g.pool}/${g.whists}`,
          gameType: g.game_type === "RANKED" ? "Ranked" : "Normal",
        };
      });
    }

    function defaultSortDirFor(key) {
      return key === "type" ? "asc" : "desc";
    }

    function defaultFilteredDealsSortDirFor(key) {
      return key === "contract" || key === "decision" ? "asc" : "desc";
    }

    function sortIndicator(key, activeKey, activeDir) {
      if (activeKey !== key) return "";
      return activeDir === "asc" ? " ▲" : " ▼";
    }

    function compareScoreRows(a, b, key) {
      if (key === "game") return a.displayId - b.displayId;
      if (key === "date" || key === "time") return a.timestamp - b.timestamp;
      if (key === "duration") return a.durationSec - b.durationSec;
      if (key === "result") return a.mmr - b.mmr;
      if (key === "mmr") return a.mmrTotal - b.mmrTotal;
      if (key === "dpw") {
        if (a.dump !== b.dump) return a.dump - b.dump;
        if (a.pool !== b.pool) return a.pool - b.pool;
        return a.whists - b.whists;
      }
      if (key === "type") return a.gameType.localeCompare(b.gameType);
      return 0;
    }

    function sortScoreRows(rows) {
      const key = state.scoreSortKey;
      const dir = state.scoreSortDir === "asc" ? 1 : -1;
      return [...rows].sort((a, b) => {
        const c = compareScoreRows(a, b, key);
        if (c !== 0) return c * dir;
        return (b.displayId - a.displayId);
      });
    }

    function compareFilteredDealRows(a, b, key) {
      if (key === "game") return a.gameDisplayId - b.gameDisplayId;
      if (key === "deal") return a.dealId - b.dealId;
      if (key === "contract") return normalizeContract(a.contract).localeCompare(normalizeContract(b.contract));
      if (key === "decision") return String(a.decision || "").localeCompare(String(b.decision || ""));
      if (key === "tricks") return a.tricks - b.tricks;
      if (key === "dpw") {
        if (a.dump !== b.dump) return a.dump - b.dump;
        if (a.pool !== b.pool) return a.pool - b.pool;
        return a.whists - b.whists;
      }
      if (key === "mmr") return a.mmr - b.mmr;
      if (key === "talon") return averageCardPoints(a.talon) - averageCardPoints(b.talon);
      if (key === "cards") return averageVisibleCardsPointsForMatch(a) - averageVisibleCardsPointsForMatch(b);
      return 0;
    }

    function sortFilteredDealRows(rows) {
      const key = state.filteredDealsSortKey;
      const dir = state.filteredDealsSortDir === "asc" ? 1 : -1;
      return [...rows].sort((a, b) => {
        const c = compareFilteredDealRows(a, b, key);
        if (c !== 0) return c * dir;
        if (b.gameId !== a.gameId) return b.gameId - a.gameId;
        return b.dealId - a.dealId;
      });
    }

    function buildTotals(games) {
      const totalGames = games.length;
      const totalWins = games.filter(g => Number(g.mmr || 0) > 0).length;
      const totalLosses = games.filter(g => Number(g.mmr || 0) < 0).length;
      const totalPositiveMmr = games.reduce((acc, g) => {
        const mmr = Number(g.mmr || 0);
        return acc + (mmr > 0 ? mmr : 0);
      }, 0);
      const totalNegativeAbsMmr = games.reduce((acc, g) => {
        const mmr = Number(g.mmr || 0);
        return acc + (mmr < 0 ? Math.abs(mmr) : 0);
      }, 0);
      const profitabilityRate = profitabilityRateText(totalPositiveMmr, totalNegativeAbsMmr);
      const totalMmr = games.reduce((acc, g) => acc + Number(g.mmr || 0), 0);
      const totalPool = games.reduce((acc, g) => acc + Number(g.pool || 0), 0);
      const totalDump = games.reduce((acc, g) => acc + Number(g.dump || 0), 0);
      const totalWhists = games.reduce((acc, g) => acc + Number(g.whists || 0), 0);
      const totalDurationSec = games.reduce((acc, g) => acc + Number(g.duration || 0), 0);
      const avgDurationSec = totalGames > 0 ? Math.round(totalDurationSec / totalGames) : 0;
      return {
        totalGames,
        profitabilityRate,
        totalMmr,
        totalPool,
        totalDump,
        totalWhists,
        totalDurationSec,
        avgDurationSec,
        totalDPW: `${formatCompactNumber(totalDump).replace("k", "")}/${formatCompactNumber(totalPool).replace("k", "")}/${formatCompactNumber(totalWhists)}`,
        totalDuration: formatDuration(totalDurationSec),
        avgDuration: formatDuration(avgDurationSec),
        resultText: `${profitabilityRate} PROFITABILITY RATE`,
      };
    }

    function buildMmrTrendSvg(games, width = 560) {
      const trendColor = (value) => {
        if (value > 0) return "var(--green)";
        if (value < 0) return "var(--red)";
        return "var(--orange)";
      };
      const asc = [...games].sort((a, b) => Number(a.id) - Number(b.id));
      if (asc.length === 0) {
        return {
          svg: `<svg class="trend-svg" viewBox="0 0 ${width} 96"><line class="trend-hover-line" x1="0" y1="0" x2="0" y2="96"></line></svg>`,
          cumulative: [],
          width,
          height: 96,
          padX: 6,
          start: 0,
          end: 0
        };
      }
      let running = 0;
      const cumulative = asc.map(g => {
        running += Number(g.mmr || 0);
        return running;
      });
      const height = 96;
      const padX = 6;
      const padY = 8;
      const minV = Math.min(...cumulative);
      const maxV = Math.max(...cumulative);
      const span = Math.max(1, maxV - minV);
      const innerW = Math.max(1, width - padX * 2);
      const innerH = Math.max(1, height - padY * 2);
      const stepX = cumulative.length > 1 ? innerW / (cumulative.length - 1) : 0;
      const pointData = cumulative.map((v, i) => {
        const x = padX + i * stepX;
        const y = padY + (1 - ((v - minV) / span)) * innerH;
        return { value: v, x, y };
      });
      const maxVisibleLabels = Math.max(2, Math.min(8, Math.floor(innerW / 78) || 2));
      const densePointStep = cumulative.length <= 48
        ? 1
        : Math.max(2, Math.ceil(cumulative.length / Math.max(18, Math.floor(innerW / 24))));
      const pointRadius = cumulative.length > 240 ? 1.1 : (cumulative.length > 120 ? 1.5 : (cumulative.length > 60 ? 1.9 : 2.6));
      const selectTrendLabelIndices = (points) => {
        if (points.length <= 2) return new Set(points.map((_, i) => i));
        const chosen = new Set([0, points.length - 1]);
        const targetLabelCount = Math.min(points.length, maxVisibleLabels);
        const diffThreshold = Math.max(8, span / Math.max(2, targetLabelCount - 1));
        const minLabelDx = Math.max(56, innerW / Math.max(1, targetLabelCount - 1) * 0.9);
        const minLabelDy = 14;
        const hasRoomForLabel = (candidateIndex) => {
          const point = points[candidateIndex];
          const estimatedWidth = Math.max(34, String(point.value).length * 7);
          return ![...chosen].some(index => {
            const other = points[index];
            const otherWidth = Math.max(34, String(other.value).length * 7);
            return Math.abs(other.x - point.x) < ((estimatedWidth + otherWidth) / 2 + 8)
              && Math.abs(other.y - point.y) < minLabelDy;
          });
        };
        const addSpacedLabels = () => {
          if (targetLabelCount <= 2) return;
          const slots = targetLabelCount - 1;
          for (let slot = 1; slot < slots; slot += 1) {
            const targetIndex = Math.round((slot / slots) * (points.length - 1));
            if (targetIndex <= 0 || targetIndex >= points.length - 1) continue;
            if (chosen.has(targetIndex)) continue;
            if (hasRoomForLabel(targetIndex)) {
              chosen.add(targetIndex);
              continue;
            }
            const searchRadius = Math.max(2, Math.ceil(points.length / Math.max(12, targetLabelCount * 3)));
            for (let offset = 1; offset <= searchRadius; offset += 1) {
              const left = targetIndex - offset;
              const right = targetIndex + offset;
              if (left > 0 && !chosen.has(left) && hasRoomForLabel(left)) {
                chosen.add(left);
                break;
              }
              if (right < points.length - 1 && !chosen.has(right) && hasRoomForLabel(right)) {
                chosen.add(right);
                break;
              }
            }
          }
        };
        addSpacedLabels();
        let lastLabeledIndex = 0;
        for (let i = 1; i < points.length - 1; i += 1) {
          if (chosen.size >= targetLabelCount) break;
          const prev = points[i - 1].value;
          const curr = points[i].value;
          const next = points[i + 1].value;
          const isPeak = curr > prev && curr >= next;
          const isValley = curr < prev && curr <= next;
          const touchesZero = curr === 0 || (prev < 0 && curr > 0) || (prev > 0 && curr < 0);
          const mmrMovedEnough = Math.abs(curr - points[lastLabeledIndex].value) >= diffThreshold;
          const hasHorizontalRoom = (points[i].x - points[lastLabeledIndex].x) >= minLabelDx;
          if ((isPeak || isValley || touchesZero || (mmrMovedEnough && hasHorizontalRoom)) && hasRoomForLabel(i)) {
            chosen.add(i);
            lastLabeledIndex = i;
          }
        }
        const candidates = points
          .map((point, i) => {
            const prev = i > 0 ? points[i - 1].value : point.value;
            const next = i < points.length - 1 ? points[i + 1].value : point.value;
            return {
              i,
              magnitude: Math.abs(point.value),
              delta: Math.max(Math.abs(point.value - prev), Math.abs(next - point.value))
            };
          })
          .sort((a, b) => (b.delta - a.delta) || (b.magnitude - a.magnitude) || (a.i - b.i));
        for (const candidate of candidates) {
          if (chosen.size >= targetLabelCount) break;
          if (chosen.has(candidate.i)) continue;
          const point = points[candidate.i];
          const nearestChosenDiff = Math.min(...[...chosen].map(index => Math.abs(points[index].value - point.value)));
          if (nearestChosenDiff < diffThreshold * 0.75) continue;
          if (hasRoomForLabel(candidate.i)) {
            chosen.add(candidate.i);
          }
        }
        return chosen;
      };
      const labelIndices = selectTrendLabelIndices(pointData);
      const pointIndices = new Set(labelIndices);
      if (pointData.length > 1) {
        for (let i = 0; i < pointData.length; i += densePointStep) {
          pointIndices.add(i);
        }
      }
      if (pointData.length > 2) {
        let minIndex = 0;
        let maxIndex = 0;
        for (let i = 1; i < pointData.length; i += 1) {
          if (pointData[i].value < pointData[minIndex].value) minIndex = i;
          if (pointData[i].value > pointData[maxIndex].value) maxIndex = i;
        }
        pointIndices.add(minIndex);
        pointIndices.add(maxIndex);
      }
      const zeroY = padY + (1 - ((0 - minV) / span)) * innerH;
      const zeroVisible = zeroY >= padY && zeroY <= (height - padY);
      const endValue = cumulative[cumulative.length - 1];
      const segmentsSvg = pointData.slice(1).map((curr, i) => {
        const prev = pointData[i];
        const v1 = prev.value;
        const v2 = curr.value;
        const sameSide = (v1 > 0 && v2 > 0) || (v1 < 0 && v2 < 0) || (v1 === 0 && v2 === 0);
        if (sameSide) {
          return `<line x1="${prev.x.toFixed(2)}" y1="${prev.y.toFixed(2)}" x2="${curr.x.toFixed(2)}" y2="${curr.y.toFixed(2)}" stroke="${trendColor(v1)}" stroke-width="2.2" stroke-linecap="round"></line>`;
        }
        if (v1 === 0 || v2 === 0) {
          const zeroPoint = v1 === 0 ? prev : curr;
          const otherPoint = v1 === 0 ? curr : prev;
          return [
            `<line x1="${zeroPoint.x.toFixed(2)}" y1="${zeroPoint.y.toFixed(2)}" x2="${otherPoint.x.toFixed(2)}" y2="${otherPoint.y.toFixed(2)}" stroke="${trendColor(otherPoint.value)}" stroke-width="2.2" stroke-linecap="round"></line>`,
            `<circle class="trend-point" cx="${zeroPoint.x.toFixed(2)}" cy="${zeroPoint.y.toFixed(2)}" r="2.6" stroke="var(--orange)"></circle>`
          ].join("");
        }
        const ratio = (0 - v1) / (v2 - v1);
        const crossX = prev.x + (curr.x - prev.x) * ratio;
        const crossY = prev.y + (curr.y - prev.y) * ratio;
        return [
          `<line x1="${prev.x.toFixed(2)}" y1="${prev.y.toFixed(2)}" x2="${crossX.toFixed(2)}" y2="${crossY.toFixed(2)}" stroke="${trendColor(v1)}" stroke-width="2.2" stroke-linecap="round"></line>`,
          `<line x1="${crossX.toFixed(2)}" y1="${crossY.toFixed(2)}" x2="${curr.x.toFixed(2)}" y2="${curr.y.toFixed(2)}" stroke="${trendColor(v2)}" stroke-width="2.2" stroke-linecap="round"></line>`,
          `<circle class="trend-point" cx="${crossX.toFixed(2)}" cy="${crossY.toFixed(2)}" r="${pointRadius.toFixed(2)}" stroke="var(--orange)"></circle>`
        ].join("");
      }).join("");
      const pointsSvg = pointData.map(({ value, x, y }, i) => {
        if (!pointIndices.has(i)) return "";
        return `<circle class="trend-point" cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${pointRadius.toFixed(2)}" stroke="${trendColor(value)}"></circle>`;
      }).join("");
      const labelsSvg = pointData.map(({ value, x, y }, i) => {
        if (!labelIndices.has(i)) return "";
        const labelY = y <= padY + 12 ? y + 11 : y - 6;
        const baseline = y <= padY + 12 ? "hanging" : "auto";
        const labelText = String(value);
        const isFirst = i === 0;
        const isLast = i === pointData.length - 1;
        const labelX = x;
        const textAnchor = isFirst ? "start" : (isLast ? "end" : "middle");
        return `<text class="trend-label" x="${labelX.toFixed(2)}" y="${labelY.toFixed(2)}" text-anchor="${textAnchor}" dominant-baseline="${baseline}" fill="${trendColor(value)}">${labelText}</text>`;
      }).join("");
      return {
        svg: `
          <svg class="trend-svg" viewBox="0 0 ${width} ${height}">
            ${zeroVisible ? `<line x1="${padX}" y1="${zeroY.toFixed(2)}" x2="${width - padX}" y2="${zeroY.toFixed(2)}" stroke="#6272a4" stroke-width="1" stroke-dasharray="4 3"></line>` : ""}
            ${segmentsSvg}
            ${pointsSvg}
            ${labelsSvg}
            <line class="trend-hover-line" x1="${padX}" y1="0" x2="${padX}" y2="${height}"></line>
          </svg>
        `,
        cumulative,
        width,
        height,
        padX,
        start: 0,
        end: endValue
      };
    }

    function profitabilityClass(text) {
      const match = String(text ?? "").match(/(-?\d+(?:\.\d+)?)\s*%/);
      if (!match) return "";
      const value = Number.parseFloat(match[1]);
      if (value > 50) return "score-good";
      if (value < 50) return "score-bad";
      return "score-even";
    }

    function scoreClass(cell) {
      const text = String(cell ?? "").trim();
      const goodWinrate = 51;
      const badWinrate = 39;
      if (!text) return "";
      if (/^[+-]?\d+$/.test(text)) {
        const value = Number(text);
        if (value > 0) return "score-good";
        if (value < 0) return "score-bad";
        return "score-mid";
      }
      if (text === "0" || text === "+0") {
        return "score-mid";
      }
      if (
        text.startsWith("+") ||
        text.startsWith("Win") ||
        (text.includes("%") && Number.parseInt(text, 10) >= goodWinrate)
      ) {
        return "score-good";
      }
      if (
        (text.startsWith("-") && text !== "-") ||
        text.startsWith("Lost") ||
        (text.includes("%") && Number.parseInt(text, 10) <= badWinrate)
      ) {
        return "score-bad";
      }
      if (
        text === "0" ||
        text.startsWith("Draw") ||
        (text.includes("%") &&
          Number.parseInt(text, 10) < goodWinrate &&
          Number.parseInt(text, 10) > badWinrate)
      ) {
        return "score-mid";
      }
      return "";
    }

    function moveStatTooltip(e) {
      if (!statTooltipEl || statTooltipEl.style.display !== "block") return;
      const pad = 12;
      const w = statTooltipEl.offsetWidth || 260;
      const h = statTooltipEl.offsetHeight || 80;
      let left = e.clientX + pad;
      let top = e.clientY + pad;
      if (left + w > window.innerWidth - 8) left = e.clientX - w - pad;
      if (left < 8) left = 8;
      if (top + h > window.innerHeight - 8) top = e.clientY - h - pad;
      if (top < 8) top = 8;
      statTooltipEl.style.left = `${left}px`;
      statTooltipEl.style.top = `${top}px`;
    }

    function showStatTooltip(text, e) {
      if (!statTooltipEl || !text) return;
      statTooltipEl.innerHTML = renderMarkdown(text);
      statTooltipEl.style.display = "block";
      moveStatTooltip(e);
    }

    function hideStatTooltip() {
      if (!statTooltipEl) return;
      statTooltipEl.style.display = "none";
    }

    function showTrendTooltip(e) {
      const panel = e.currentTarget;
      const values = String(panel.dataset.mmrValues || "")
        .split(",")
        .filter(Boolean)
        .map(v => Number(v));
      if (!values.length) return;
      const svg = panel.querySelector(".trend-svg");
      if (!svg) return;
      const padX = Number(panel.dataset.padX || 0);
      const viewWidth = Number(panel.dataset.viewWidth || 0);
      const viewHeight = Number(panel.dataset.viewHeight || 96);
      const rect = svg.getBoundingClientRect();
      const innerWidth = Math.max(1, viewWidth - padX * 2);
      const mouseX = Math.min(Math.max(0, e.clientX - rect.left), rect.width);
      const xInViewBox = rect.width > 0 ? (mouseX / rect.width) * viewWidth : 0;
      const clampedX = Math.min(Math.max(padX, xInViewBox), viewWidth - padX);
      const ratio = innerWidth > 0 ? (clampedX - padX) / innerWidth : 0;
      const rawIndex = ratio * Math.max(0, values.length - 1);
      const leftIndex = Math.max(0, Math.min(values.length - 1, Math.floor(rawIndex)));
      const rightIndex = Math.max(0, Math.min(values.length - 1, Math.ceil(rawIndex)));
      const segmentRatio = rightIndex === leftIndex ? 0 : (rawIndex - leftIndex) / (rightIndex - leftIndex);
      const hoveredValue = rightIndex === leftIndex
        ? values[leftIndex]
        : values[leftIndex] + (values[rightIndex] - values[leftIndex]) * segmentRatio;
      const hoverLine = svg.querySelector(".trend-hover-line");
      if (hoverLine) {
        hoverLine.setAttribute("x1", clampedX.toFixed(2));
        hoverLine.setAttribute("x2", clampedX.toFixed(2));
        hoverLine.setAttribute("y1", "0");
        hoverLine.setAttribute("y2", String(viewHeight));
        hoverLine.style.display = "block";
      }
      statTooltipEl?.classList.remove("score-good", "score-bad", "score-mid");
      statTooltipEl?.classList.add(scoreClass(String(Math.round(hoveredValue))));
      showStatTooltip(`${Math.round(hoveredValue)} MMR`, e);
    }

    function hideTrendTooltip(e) {
      const panel = e.currentTarget;
      const hoverLine = panel.querySelector(".trend-hover-line");
      if (hoverLine) {
        hoverLine.style.display = "none";
      }
      statTooltipEl?.classList.remove("score-good", "score-bad", "score-mid");
      hideStatTooltip();
    }

    function formatSignedDelta(value) {
      const v = Number(value || 0);
      if (Math.abs(v) < 0.005) return "0.00";
      return `${v > 0 ? "+" : ""}${v.toFixed(2)}`;
    }

    function formatSignedPpDelta(value) {
      const v = Number(value || 0);
      if (Math.abs(v) < 0.005) return "0.00";
      return `${v > 0 ? "+" : ""}${v.toFixed(2)}`;
    }

    function formatSignedInteger(value) {
      const n = Math.trunc(Number(value || 0));
      return `${n > 0 ? "+" : ""}${n}`;
    }

    function formatDealSplit(matches, filterKey) {
      const list = Array.isArray(matches) ? matches : [];
      const total = list.length;
      if (!["hands", "akq", "akqj", "aces3", "declarer", "pass", "passing", "passingZero", "whist", "miser"].includes(filterKey)) return `${total}`;
      let positive = 0;
      let negative = 0;
      let totalMmr = 0;
      for (const match of list) {
        const mmr = Number(match?.mmr || 0);
        totalMmr += mmr;
        if (mmr > 0) {
          positive += 1;
        } else if (mmr < 0) {
          negative += 1;
        }
      }
      if (filterKey === "hands") {
        return `${total} • <span class="score-good">${positive}</span> • <span class="score-bad">${negative}</span>`;
      }
      return `${total} • <span class="score-good">${positive}</span> • <span class="score-bad">${negative}</span> • <span class="${scoreClass(formatSignedInteger(totalMmr))}">${formatSignedInteger(totalMmr)}</span><span class="mmr-suffix"> MMR</span>`;
    }

    async function loadComparisonIfNeeded() {
      const ids = state.users.map(u => u.player_id);
      state.comparisonSelectedUserIds = [...ids];
      if (ids.length < 2) {
        state.comparisonData = null;
        state.comparisonCacheKey = "";
        return;
      }
      const cacheKey = `cmp:${[...ids].sort().join(",")}:${lastDataVersion || 0}`;
      if (state.comparisonCacheKey === cacheKey || state.comparisonLoading) return;
      state.comparisonLoading = true;
      state.comparisonError = "";
      renderMain();
      const idsAtStart = ids.join("|");
      try {
        const fetchWithTimeout = (path, ms) => new Promise(resolve => {
          let done = false;
          const timer = setTimeout(() => { if (!done) { done = true; resolve(null); } }, ms);
          api(path).then(v => { if (!done) { done = true; clearTimeout(timer); resolve(v); } })
                   .catch(() => { if (!done) { done = true; clearTimeout(timer); resolve(null); } });
        });
        const gamesLists = await Promise.all(
          ids.map(pid => fetchWithTimeout(`api/users/${encodeURIComponent(pid)}/games`, 15000))
        );
        if (!state.comparisonMode || state.users.map(u => u.player_id).join("|") !== idsAtStart) return;
        const uniqueGameIds = new Set();
        gamesLists.forEach(list => {
          (Array.isArray(list) ? list : []).forEach(g => uniqueGameIds.add(Number(g.id)));
        });
        const details = await Promise.all(
          [...uniqueGameIds].map(id => fetchWithTimeout(`api/games/${id}`, 15000))
        );
        if (!state.comparisonMode || state.users.map(u => u.player_id).join("|") !== idsAtStart) return;
        const validDetails = details.filter(Boolean);
        const byUser = {};
        ids.forEach((pid, i) => {
          const user = state.users.find(u => u.player_id === pid);
          const games = Array.isArray(gamesLists[i]) ? gamesLists[i] : [];
          byUser[pid] = {
            user,
            games,
            stats: computeHandStatsForPlayer(pid, validDetails),
            totals: buildTotals(games),
          };
        });
        state.comparisonData = { byUser, userIds: [...ids] };
        state.comparisonCacheKey = cacheKey;
      } catch (err) {
        state.comparisonError = String(err?.message || err || "Failed to load group view.");
      } finally {
        state.comparisonLoading = false;
        if (state.comparisonMode && state.users.map(u => u.player_id).join("|") === idsAtStart) renderMain();
      }
    }

    function comparisonRowDefs() {
      const pctNum = (s) => {
        const m = String(s ?? "").match(/(-?\d+(?:\.\d+)?)/);
        return m ? parseFloat(m[1]) : 0;
      };
      const signed = (v) => `${v > 0 ? "+" : ""}${v}`;
      const mmrCell = (v) => `<span class="${scoreClass(String(v))}">${signed(v)}</span>`;
      const pctCell = (s) => `<span class="${profitabilityClass(s)}">${esc(s)}</span>`;
      const splitCell = (cat) => {
        const c = cat || { count: 0, positive: 0, negative: 0, mmrSum: 0 };
        const mmr = Number(c.mmrSum || 0);
        return `${c.count} • <span class="score-good">${c.positive}</span> • <span class="score-bad">${c.negative}</span> • <span class="${scoreClass(String(mmr))}">${signed(mmr)}</span>`;
      };
      const splitTip = "Total deals • positive • negative • total MMR.";
      const profitTip = "Profitability rate: positive MMR divided by absolute MMR.";
      const passFamilyTip = "Percentage of deals passed.";
      const whistFamilyTip = "Percentage of deals played as whist/half-whist.";
      const declarerFamilyTip = "Percentage of deals played as declarer.";
      const allPassFamilyTip = "Percentage of deals where all players passed.";
      const miserFamilyTip = "Percentage of deals played as misère.\n↑ - profitability rate for those deals: positive MMR divided by absolute MMR.";
      const declaredRows = [6, 7, 8, 9, 10].flatMap(level => [
        {
          label: `${level} Game %`,
          tip: `Percentage of deals played by this player as a ${level} game declarer.`,
          text: d => esc(d.stats[`declared${level}Pct`]),
        },
        {
          label: `${level} Game Profit.`,
          tip: profitTip,
          value: d => pctNum(d.stats[`declared${level}MadePct`]),
          text: d => pctCell(d.stats[`declared${level}MadePct`]),
          better: "higher",
        },
        {
          label: `${level} Game Deals`,
          tip: splitTip,
          text: d => splitCell(d.stats[`declared${level}Category`]),
        },
      ]);
      return [
        { section: "Games" },
        { label: "Games", tip: "Total number of games.", value: d => d.totals.totalGames, text: d => String(d.totals.totalGames), better: "higher" },
        { label: "Total MMR", tip: "Net MMR change.", value: d => d.totals.totalMmr, text: d => mmrCell(d.totals.totalMmr), better: "higher" },
        { label: "Profitability", tip: profitTip, value: d => pctNum(d.totals.profitabilityRate), text: d => pctCell(d.totals.profitabilityRate), better: "higher" },

    function renderComparisonView(content) {
      const ids = state.users.map(u => u.player_id);
      if (ids.length < 2) {
        content.innerHTML = `
          <div class="compare-view-header">
            <button type="button" class="compare-close" data-action="compare-exit" aria-label="Exit overview" title="Exit overview">⬅</button>
            <div class="compare-empty compare-empty-inline">At least 2 players are needed to show the overview.</div>
          </div>
        `;
        wireComparisonHandlers(content);
        return;
      }
      if (state.comparisonLoading && !state.comparisonData) {
        content.innerHTML = `
          <div class="compare-view-header">
            <button type="button" class="compare-close" data-action="compare-exit" aria-label="Exit overview" title="Exit overview">⬅</button>
            <div class="compare-empty compare-empty-inline">Loading group view...</div>
          </div>
        `;
        wireComparisonHandlers(content);
        return;
      }
      if (state.comparisonError) {
        content.innerHTML = `
          <div class="compare-view-header">
            <button type="button" class="compare-close" data-action="compare-exit" aria-label="Exit overview" title="Exit overview">⬅</button>
            <div class="compare-empty compare-empty-inline">${esc(state.comparisonError)}</div>
          </div>
        `;
        wireComparisonHandlers(content);
        return;
      }
      const data = state.comparisonData;
      if (!data) {
        content.innerHTML = `
          <div class="compare-view-header">
            <button type="button" class="compare-close" data-action="compare-exit" aria-label="Exit overview" title="Exit overview">⬅</button>
            <div class="compare-empty compare-empty-inline">Loading group view...</div>
          </div>
        `;
        wireComparisonHandlers(content);
        return;
      }
      const orderedIds = [...data.userIds].sort((a, b) => {
        const ma = Number(data.byUser[a]?.totals?.totalMmr ?? 0);
        const mb = Number(data.byUser[b]?.totals?.totalMmr ?? 0);
        return mb - ma;
      });
      const rows = comparisonRowDefs();
      const headerCells = orderedIds.map(pid => {
        const name = data.byUser[pid]?.user?.player_name || pid;
        return `<th>${esc(name)}</th>`;
      }).join("");
      const bodyRows = rows.map(row => {
        if (row.section) {
          return `<tr class="section-row"><td colspan="${orderedIds.length + 1}">${esc(row.section)}</td></tr>`;
        }
        const cells = orderedIds.map(pid => {
          const d = data.byUser[pid];
          let cellText = "-";
          try { cellText = row.text ? row.text(d) : "-"; } catch { cellText = "-"; }
          let cls = "";
          const allClasses = String(cellText).match(/score-(good|bad|mid)/g) || [];
          const last = allClasses[allClasses.length - 1];
          if (last === "score-good") cls = "compare-best";
          else if (last === "score-bad") cls = "compare-worst";
          else if (last === "score-mid") cls = "compare-mid";
          return `<td class="${cls}">${cellText}</td>`;
        }).join("");
        const tipAttr = row.tip ? ` data-tip="${esc(row.tip)}"` : "";
        return `<tr${tipAttr}><td class="stat-label">${esc(row.label)}</td>${cells}</tr>`;
      }).join("");
      content.innerHTML = `
        <div class="compare-title-row">
          <h2 class="compare-title">Overview</h2>
          <button type="button" class="compare-close compare-floating-close" data-action="compare-exit" aria-label="Exit overview" title="Exit overview">⬅</button>
        </div>
        <div class="compare-table-outer">
          <div class="compare-table-wrap">
            <table class="compare-table">
              <thead>
                <tr><th>Statistic</th>${headerCells}</tr>
              </thead>
              <tbody>${bodyRows}</tbody>
            </table>
          </div>
        </div>
      `;
      wireComparisonHandlers(content);
    }

    function wireComparisonHandlers(content) {
      content.querySelectorAll("[data-action='compare-exit']").forEach(el => {
        el.addEventListener("click", () => exitComparisonMode());
      });
      content.querySelectorAll("[data-tip]").forEach(el => {
        el.addEventListener("mouseenter", e => showStatTooltip(el.dataset.tip || "", e));
        el.addEventListener("mousemove", moveStatTooltip);
        el.addEventListener("mouseleave", hideStatTooltip);
      });
    }

      const btn = document.querySelector(".compare-close.compare-floating-close");

      if (!btn || !content) return;
      const rect = content.getBoundingClientRect();
      btn.style.left = `${Math.round(rect.left + 24)}px`;
      btn.style.top = `${Math.round(Math.max(rect.top + 24, 24))}px`;
    }

                      <th class="sortable ${state.filteredDealsSortKey === "game" ? "active" : ""}" data-filtered-sort-key="game">GAME${sortIndicator("game", state.filteredDealsSortKey, state.filteredDealsSortDir)}</th>
                      <th class="sortable ${state.filteredDealsSortKey === "deal" ? "active" : ""}" data-filtered-sort-key="deal">DEAL${sortIndicator("deal", state.filteredDealsSortKey, state.filteredDealsSortDir)}</th>
                      <th class="sortable ${state.filteredDealsSortKey === "contract" ? "active" : ""}" data-filtered-sort-key="contract">CONTRACT${sortIndicator("contract", state.filteredDealsSortKey, state.filteredDealsSortDir)}</th>
                      <th class="sortable ${state.filteredDealsSortKey === "decision" ? "active" : ""}" data-filtered-sort-key="decision">DECISION${sortIndicator("decision", state.filteredDealsSortKey, state.filteredDealsSortDir)}</th>
                      <th class="sortable ${state.filteredDealsSortKey === "tricks" ? "active" : ""}" data-filtered-sort-key="tricks">TRICKS${sortIndicator("tricks", state.filteredDealsSortKey, state.filteredDealsSortDir)}</th>
                      <th class="sortable ${state.filteredDealsSortKey === "dpw" ? "active" : ""}" data-filtered-sort-key="dpw">D/P/W${sortIndicator("dpw", state.filteredDealsSortKey, state.filteredDealsSortDir)}</th>
                      <th class="sortable ${state.filteredDealsSortKey === "mmr" ? "active" : ""}" data-filtered-sort-key="mmr">MMR${sortIndicator("mmr", state.filteredDealsSortKey, state.filteredDealsSortDir)}</th>
                      <th class="sortable ${state.filteredDealsSortKey === "talon" ? "active" : ""}" data-filtered-sort-key="talon">TALON${sortIndicator("talon", state.filteredDealsSortKey, state.filteredDealsSortDir)}</th>
                      <th class="sortable ${state.filteredDealsSortKey === "cards" ? "active" : ""}" data-filtered-sort-key="cards">CARDS${sortIndicator("cards", state.filteredDealsSortKey, state.filteredDealsSortDir)}</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${filteredMatches.map(m => `
                      <tr>
                        <td>${m.gameDisplayId}</td>
                        <td>${m.dealId}</td>
                        <td><span class="pill">${bidHtml(m.contract)}</span>${String(m.declarerId || "") === String(state.selectedUserId || "") ? "" : ` ${esc(m.declarerName || "-")}`}</td>
                        <td><span class="pill">${bidHtml(m.decision)}</span></td>
                        <td>${esc(m.tricks)}</td>
                        <td>${esc(m.dpw)}</td>
                        <td class="${scoreClass(String(m.mmr))}">${m.mmr > 0 ? "+" : ""}${m.mmr}</td>
                        <td class="cards">${cardsHtml(m.talon || [])}</td>
                        <td class="cards">${shouldShowSeparateTalonForMatch(m)
                          ? cardsHtml(m.cards || [])
                          : dealCardsHtml(m.cards || [], m.talon || [], m.discardedCards || [])}</td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            `}
          </div>
          ` : ""}
          <div class="trend-panel" data-mmr-values="${trend.cumulative.join(",")}" data-view-width="${trend.width}" data-view-height="${trend.height}" data-pad-x="${trend.padX}">
            ${trend.svg}
          </div>
          <div class="games-table-wrap ${state.selectedGameId !== null ? "limited" : ""}">
            <table>
              <thead class="score-header">
                <tr>
                  <th class="col-game sortable ${state.scoreSortKey === "game" ? "active" : ""}" data-sort-key="game">GAME${sortIndicator("game", state.scoreSortKey, state.scoreSortDir)}</th>
                  <th class="sortable ${state.scoreSortKey === "date" ? "active" : ""}" data-sort-key="date">DATE${sortIndicator("date", state.scoreSortKey, state.scoreSortDir)}</th>
                  <th class="sortable ${state.scoreSortKey === "time" ? "active" : ""}" data-sort-key="time">TIME${sortIndicator("time", state.scoreSortKey, state.scoreSortDir)}</th>
                  <th class="sortable ${state.scoreSortKey === "duration" ? "active" : ""}" data-sort-key="duration">DURATION${sortIndicator("duration", state.scoreSortKey, state.scoreSortDir)}</th>
                  <th class="sortable ${state.scoreSortKey === "result" ? "active" : ""}" data-sort-key="result">RESULT${sortIndicator("result", state.scoreSortKey, state.scoreSortDir)}</th>
                  <th class="sortable ${state.scoreSortKey === "mmr" ? "active" : ""}" data-sort-key="mmr">MMR${sortIndicator("mmr", state.scoreSortKey, state.scoreSortDir)}</th>
                  <th class="sortable ${state.scoreSortKey === "dpw" ? "active" : ""}" data-sort-key="dpw">D/P/W${sortIndicator("dpw", state.scoreSortKey, state.scoreSortDir)}</th>
                  <th class="sortable ${state.scoreSortKey === "type" ? "active" : ""}" data-sort-key="type">TYPE${sortIndicator("type", state.scoreSortKey, state.scoreSortDir)}</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map(r => `
                  <tr class="game-row ${Number(r.id) === state.selectedGameId ? "selected" : ""}" data-game-id="${r.id}" data-game-display-id="${r.displayId}">
                    <td class="col-game">${r.displayId}</td>
                    <td>${esc(r.date)}</td>
                    <td>${esc(r.time)}</td>
                    <td>${esc(r.duration)}</td>
                    <td class="${scoreClass(r.result)}">${esc(r.result)}</td>
                    <td class="${scoreClass(r.mmrTotalText)}">${esc(r.mmrTotalText)}</td>
                    <td>${esc(r.dpw)}</td>
                    <td>${esc(r.gameType)}</td>
                  </tr>
                `).join("") || `<tr><td colspan="8" class="empty">No games</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      `;

      let dealsSection = ``;
      if (state.selectedGameId !== null) {
        if (state.gameDetailsMessage) {
          dealsSection = `<div class="section"><div class="empty">${esc(state.gameDetailsMessage)}</div></div>`;
        } else if (state.gameDetails && Array.isArray(state.gameDetails.deals) && state.gameDetails.deals.length > 0) {
          dealsSection = `
        <div class="section">
          <h2>Game ${state.selectedGameDisplayId ?? state.gameDetails.id} • Deals: ${state.gameDetails.deals.length}</h2>
          ${[...state.gameDetails.deals].sort((a, b) => Number(b.id) - Number(a.id)).map(deal => `
            <div class="deal">
              <div class="deal-head">Deal ${deal.id} • Declarer: ${esc(deal.declarer_name || deal.declarer_id || "-")} • Contract: ${bidHtml(deal.contract)}</div>
              <table class="deals-table">
                <colgroup>
                  <col style="width:14.2857%">
                  <col style="width:14.2857%">
                  <col style="width:14.2857%">
                  <col style="width:14.2857%">
                  <col style="width:14.2857%">
                  <col style="width:28.5714%">
                </colgroup>
                <thead>
                  <tr><th>NAME</th><th class="col-decision">DECISION</th><th>TRICKS</th><th>D/P/W</th><th>MMR</th><th>CARDS</th></tr>
                </thead>
                <tbody>
                  ${dealRows(deal)}
                  <tr>
                    <td>Talon</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td class="cards">${cardsHtml(deal.talon || [])}</td>
                  </tr>
                </tbody>
              </table>
              ${dealTricksHtml(deal)}
            </div>
          `).join("")}
        </div>
      `;
        } else {
          dealsSection = `<div class="section"><div class="empty">No deal data for game ${esc(state.selectedGameDisplayId ?? state.selectedGameId)}.</div></div>`;
        }
      }

      content.innerHTML = gamesTable + dealsSection;
      syncGamesTableViewport(content);
      syncFilteredTableViewport(content);
      const gamesWrap = content.querySelector(".games-table-wrap");
      if (gamesWrap) gamesWrap.scrollTop = prevGamesScrollTop;
      const filteredWrap = content.querySelector(".filtered-table-wrap");
      if (filteredWrap) filteredWrap.scrollTop = prevFilteredScrollTop;
      if (mainEl) mainEl.scrollTop = prevMainScrollTop;
      syncSelectedGameIntoView(content);
      content.querySelectorAll("[data-tip]").forEach(el => {
        if (el.classList.contains("trend-panel")) return;
        el.addEventListener("mouseenter", e => showStatTooltip(el.dataset.tip || "", e));
        el.addEventListener("mousemove", moveStatTooltip);
        el.addEventListener("mouseleave", hideStatTooltip);
      });
      content.querySelectorAll(".trend-panel").forEach(el => {
        el.addEventListener("mouseenter", showTrendTooltip);
        el.addEventListener("mousemove", showTrendTooltip);
        el.addEventListener("mouseleave", hideTrendTooltip);
      });
      content.querySelectorAll("[data-action='filter-akq']").forEach(el => {
        el.addEventListener("click", () => {
          state.activeHandFilter = state.activeHandFilter === "akq" ? "" : "akq";
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-action='filter-hands']").forEach(el => {
        el.addEventListener("click", () => {
          state.activeHandFilter = state.activeHandFilter === "hands" ? "" : "hands";
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-action='filter-akqj']").forEach(el => {
        el.addEventListener("click", () => {
          state.activeHandFilter = state.activeHandFilter === "akqj" ? "" : "akqj";
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-action='filter-aces3']").forEach(el => {
        el.addEventListener("click", () => {
          state.activeHandFilter = state.activeHandFilter === "aces3" ? "" : "aces3";
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-action='filter-miser']").forEach(el => {
        el.addEventListener("click", () => {
          state.activeHandFilter = state.activeHandFilter === "miser" ? "" : "miser";
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-action='filter-declarer']").forEach(el => {
        el.addEventListener("click", () => {
          state.activeHandFilter = state.activeHandFilter === "declarer" ? "" : "declarer";
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-action='filter-pass']").forEach(el => {
        el.addEventListener("click", () => {
          state.activeHandFilter = state.activeHandFilter === "pass" ? "" : "pass";
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-action='filter-passing-zero']").forEach(el => {
        el.addEventListener("click", () => {
          state.activeHandFilter = state.activeHandFilter === "passingZero" ? "" : "passingZero";
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-action='filter-passing']").forEach(el => {
        el.addEventListener("click", () => {
          state.activeHandFilter = state.activeHandFilter === "passing" ? "" : "passing";
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-action='filter-whist']").forEach(el => {
        el.addEventListener("click", () => {
          state.activeHandFilter = state.activeHandFilter === "whist" ? "" : "whist";
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-sort-key]").forEach(el => {
        el.addEventListener("click", () => {
          const key = String(el.dataset.sortKey || "");
          if (!key) return;
          if (state.scoreSortKey === key) {
            state.scoreSortDir = state.scoreSortDir === "asc" ? "desc" : "asc";
          } else {
            state.scoreSortKey = key;
            state.scoreSortDir = defaultSortDirFor(key);
          }
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-filtered-sort-key]").forEach(el => {
        el.addEventListener("click", () => {
          const key = String(el.dataset.filteredSortKey || "");
          if (!key) return;
          if (state.filteredDealsSortKey === key) {
            state.filteredDealsSortDir = state.filteredDealsSortDir === "asc" ? "desc" : "asc";
          } else {
            state.filteredDealsSortKey = key;
            state.filteredDealsSortDir = defaultFilteredDealsSortDirFor(key);
          }
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-action='toggle-analysis']").forEach(el => {
        el.addEventListener("click", () => {
          state.analysisCollapsed = !state.analysisCollapsed;
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("[data-action='clear-main-selection']").forEach(el => {
        el.addEventListener("click", () => {
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          state.activeHandFilter = "";
          saveViewState();
          renderMain();
        });
      });
      content.querySelectorAll("tr[data-game-id]").forEach(row => {
        row.addEventListener("click", async () => {
          const clickedGameId = Number(row.dataset.gameId);
          if (state.selectedGameId === clickedGameId) {
            state.selectedGameId = null;
            state.pendingGameScrollId = null;
            state.selectedGameDisplayId = null;
            state.gameDetails = null;
            state.gameDetailsMessage = "";
            saveViewState();
            renderMain();
            return;
          }
          await selectGame(row.dataset.gameId, row.dataset.gameDisplayId);
        });
      });
    }

    function syncGamesTableViewport(contentRoot) {
      const wrap = contentRoot.querySelector(".games-table-wrap");
      if (!wrap) return;
      if (state.selectedGameId === null) {
        wrap.style.maxHeight = "none";
        return;
      }
      const headerRow = wrap.querySelector("thead tr");
      const firstDataRow = wrap.querySelector("tbody tr");
      if (!headerRow || !firstDataRow) {
        wrap.style.maxHeight = "none";
        return;
      }
      const headerH = headerRow.getBoundingClientRect().height;
      const rowH = firstDataRow.getBoundingClientRect().height;
      const target = Math.ceil(headerH + rowH * 3 + 2);
      wrap.style.maxHeight = `${target}px`;
    }

    function syncSelectedGameIntoView(contentRoot) {
      if (state.pendingGameScrollId === null) return;
      const wrap = contentRoot.querySelector(".games-table-wrap");
      if (!wrap) {
        state.pendingGameScrollId = null;
        return;
      }
      const row = wrap.querySelector(`tr[data-game-id="${state.pendingGameScrollId}"]`);
      if (!row) {
        state.pendingGameScrollId = null;
        return;
      }
      const rowTop = row.offsetTop;
      const rowBottom = rowTop + row.offsetHeight;
      const viewTop = wrap.scrollTop;
      const viewBottom = viewTop + wrap.clientHeight;
      if (rowTop < viewTop) {
        wrap.scrollTop = rowTop;
      } else if (rowBottom > viewBottom) {
        wrap.scrollTop = rowBottom - wrap.clientHeight;
      }
      state.pendingGameScrollId = null;
    }

    function syncFilteredTableViewport(contentRoot) {
      const wrap = contentRoot.querySelector(".filtered-table-wrap");
      if (!wrap) return;
      const headerRow = wrap.querySelector("thead tr");
      const firstDataRow = wrap.querySelector("tbody tr");
      if (!headerRow || !firstDataRow) {
        wrap.style.maxHeight = "none";
        return;
      }
      const headerH = headerRow.getBoundingClientRect().height;
      const rowH = firstDataRow.getBoundingClientRect().height;
      const target = Math.ceil(headerH + rowH * 6 + 2);
      wrap.style.maxHeight = `${target}px`;
    }

    function render() {
      renderUsers();
      renderMain();
    }

    async function loadUsers() {
      state.users = await api("api/users");
    }

    async function loadGames() {
      state.games = await api(`api/users/${encodeURIComponent(state.selectedUserId)}/games`);
    }

    async function refreshData() {
      if (refreshInFlight) return;
      refreshInFlight = true;
      try {
        const currentVersion = await fetchDataVersion();
        if (currentVersion !== null && currentVersion === lastDataVersion) {
          return;
        }
        if (currentVersion !== null) lastDataVersion = currentVersion;
        await loadUsers();
        if (state.selectedUserId && !state.users.some(u => u.player_id === state.selectedUserId)) {
          state.selectedUserId = null;
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          render();
          return;
        }
        if (state.selectedUserId) {
          await loadGames();
          syncSelectedGameDisplayId();
          if (state.selectedGameId && !state.games.some(g => Number(g.id) === state.selectedGameId)) {
            state.selectedGameId = null;
            state.selectedGameDisplayId = null;
            state.gameDetails = null;
            state.gameDetailsMessage = "";
            saveViewState();
            render();
            return;
          }
          if (state.selectedGameId !== null) {
            await loadSelectedGameDetails();
          }
        }
        render();
      } finally {
        refreshInFlight = false;
      }
    }

    function startAutoRefresh() {
      if (refreshTimer !== null) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => {
        refreshData().catch(() => {});
      }, 5000);
    }

    async function boot() {
      try {
        const appTitle = document.getElementById("app-title");
        const scrollTopButton = document.getElementById("scroll-top-button");
        let resizeFrame = 0;
        const updateScrollTopButton = () => {
          const mainEl = document.querySelector(".main");
          const scrollTop = Math.max(
            mainEl ? mainEl.scrollTop : 0,
            window.scrollY,
            document.documentElement ? document.documentElement.scrollTop : 0,
            document.body ? document.body.scrollTop : 0
          );
          if (scrollTopButton) {
            scrollTopButton.hidden = scrollTop <= 4;
          }
          updateOverviewFloatingButton();
        };
        const appEl = document.getElementById("app");
        const SIDEBAR_HIDDEN_KEY = "prefbuff_sidebar_hidden";
        if (appEl && localStorage.getItem(SIDEBAR_HIDDEN_KEY) === "1") {
          appEl.classList.add("sidebar-hidden");
        }
        document.addEventListener("click", (e) => {
          const btn = e.target.closest("#sidebar-toggle-inline");
          if (!btn || !appEl) return;
          e.stopPropagation();
          const hidden = appEl.classList.toggle("sidebar-hidden");
          try { localStorage.setItem(SIDEBAR_HIDDEN_KEY, hidden ? "1" : "0"); } catch (_) {}
        });
        if (appTitle) {
          appTitle.addEventListener("click", () => {
            if (state.comparisonMode) {
              exitComparisonMode();
              return;
            }
            state.selectedUserId = null;
            state.selectedGameId = null;
            state.selectedGameDisplayId = null;
            state.gameDetails = null;
            state.gameDetailsMessage = "";
            saveViewState();
            render();
          });
        }
        const compareToggleBtn = document.getElementById("compare-toggle");
        if (compareToggleBtn) {
          compareToggleBtn.addEventListener("click", () => {
            if (state.comparisonMode) exitComparisonMode();
            else enterComparisonMode();
          });
        }
        if (scrollTopButton) {
          scrollTopButton.addEventListener("click", () => {
            const mainEl = document.querySelector(".main");
            if (mainEl) {
              mainEl.scrollTop = 0;
            }
            window.scrollTo(0, 0);
            updateScrollTopButton();
          });
        }
        const mainEl = document.querySelector(".main");
        if (mainEl) {
          mainEl.addEventListener("scroll", updateScrollTopButton);
        }
        window.addEventListener("scroll", updateScrollTopButton);
        window.addEventListener("resize", () => {
          if (resizeFrame) cancelAnimationFrame(resizeFrame);
          resizeFrame = requestAnimationFrame(() => {
            resizeFrame = 0;
            render();
            updateScrollTopButton();
          });
        });
        loadViewState();
        const urlSelection = applySelectedUserIdFromUrl();
        await loadUsers();
        if (state.selectedUserId && state.users.some(u => u.player_id === state.selectedUserId)) {
          await loadGames();
          if (urlSelection.selectedUserFromUrl && urlSelection.selectLatestGame) {
            state.selectedGameId = latestGameId(state.games);
            syncSelectedGameDisplayId();
            if (state.selectedGameId !== null) {
              await loadSelectedGameDetails();
            }
          } else {
            syncSelectedGameDisplayId();
            if (state.selectedGameId !== null && state.games.some(g => Number(g.id) === state.selectedGameId)) {
              await loadSelectedGameDetails();
            } else {
              state.selectedGameId = null;
              state.selectedGameDisplayId = null;
            }
          }
        } else {
          state.selectedUserId = null;
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
        }
        saveViewState();
        render();
        updateScrollTopButton();
        lastDataVersion = await fetchDataVersion();
        startAutoRefresh();
      } catch (err) {
        document.getElementById("content").innerHTML =
          `<div class="empty">Failed to load data: ${esc(err?.message || err)}</div>`;
      }
    }

    boot();
  </script>
</body>
