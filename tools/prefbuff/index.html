<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PREFBUFF - Preferans Statistics</title>
  <style>
    :root {
      --bg: #282a36;
      --panel: #44475a;
      --panel-2: #6272a4;
      --text: #f8f8f2;
      --muted: #6272a4;
      --accent: #8be9fd;
      --red: #ff5555;
      --line: #6272a4;
      --green: #50fa7b;
      --orange: #ffb86c;
      --yellow: #f1fa8c;
      --pink: #ff79c6;
      --purple: #bd93f9;
      --table-border: #7e8aa8;
      --table-bg: #2e3448;
      --table-bg-alt: #2b3043;
      --table-head-bg: #252b3c;
      --table-total-bg: #3a415a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 10% 10%, #44475a 0%, var(--bg) 55%);
      color: var(--text);
    }
    .app {
      display: grid;
      grid-template-columns: 131px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(40, 42, 54, 0.8);
      backdrop-filter: blur(3px);
      padding: 14px;
      overflow: auto;
    }
    .main {
      padding: 16px;
      overflow: auto;
    }
    h1 { margin: 0 0 6px; font-size: 20px; text-align: center; cursor: pointer; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
    .list-item {
      border: 1px solid var(--table-border);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      background: var(--table-bg-alt);
      cursor: pointer;
    }
    .list-item:hover { border-color: var(--accent); }
    .list-item.active { outline: 2px solid var(--accent); }
    .name { font-weight: 700; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .section {
      border: 1px solid var(--table-border);
      border-radius: 12px;
      background: var(--table-bg);
      padding: 12px;
      margin-bottom: 14px;
    }
    .section h2 { margin: 0 0 8px; font-size: 18px; }
    .section h2.clearable {
      cursor: pointer;
    }
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .summary-card {
      border: 1px solid var(--table-border);
      border-radius: 10px;
      background: var(--table-bg-alt);
      padding: 7px 8px;
      min-width: 0;
    }
    .summary-card[data-action] {
      cursor: pointer;
    }
    .summary-card[data-action]:hover {
      border-color: var(--accent);
    }
    .summary-card.is-active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(139, 233, 253, 0.35);
    }
    .summary-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
      font-weight: 700;
    }
    .summary-value {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0 6px;
      font-size: clamp(15px, 1.2vw, 18px);
      font-weight: 700;
      line-height: 1.2;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      overflow-wrap: anywhere;
    }
    .games-block {
      margin-bottom: 14px;
    }
    .trend-panel {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      margin-bottom: 10px;
    }
    .trend-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .trend-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      color: var(--muted);
    }
    .trend-value { font-size: 12px; color: #d7def5; }
    .trend-svg {
      width: 100%;
      height: 96px;
      display: block;
      border-radius: 8px;
      background: #252b3c;
      border: 1px solid rgba(126, 138, 168, 0.45);
    }
    .hand-stats {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      margin-bottom: 10px;
    }
    .hand-stats-grid {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 8px;
    }
    .hand-stat-card {
      border: 1px solid var(--table-border);
      border-radius: 8px;
      background: var(--table-bg);
      padding: 8px;
      min-width: 0;
    }
    .hand-stat-card[data-action]:hover {
      border-color: var(--accent);
    }
    .hand-stat-card[data-action] {
      cursor: pointer;
    }
    .hand-stat-card.is-active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(139, 233, 253, 0.35);
    }
    .hand-stat-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
      font-weight: 700;
    }
    .hand-stat-value {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0 6px;
      color: #d7def5;
      font-size: clamp(14px, 1.05vw, 16px);
      font-weight: 700;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      overflow-wrap: anywhere;
    }
    .hand-stat-delta {
      margin-left: 0;
      font-size: 12px;
      font-weight: 700;
    }
    .hand-stat-prefix {
      color: var(--muted);
    }
    .hand-stat-sub {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .mmr-suffix {
      font-size: 0.75em;
      color: var(--muted);
    }
    .stat-tooltip {
      position: fixed;
      z-index: 60;
      pointer-events: none;
      max-width: none;
      border: 1px solid var(--table-border);
      border-radius: 8px;
      background: rgba(37, 43, 60, 0.96);
      color: #d7def5;
      font-size: 12px;
      line-height: 1.35;
      white-space: pre-line;
      padding: 8px 9px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      display: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      border: 1px solid var(--table-border);
      background: var(--table-bg);
    }
    .games-table-wrap {
      max-height: none;
      overflow-y: auto;
      border: 1px solid var(--table-border);
      border-radius: 8px;
    }
    .games-table-wrap table {
      border: none;
      border-radius: 0;
    }
    .filtered-table-wrap {
      max-height: none;
      overflow-y: auto;
      border: 1px solid var(--table-border);
      border-radius: 8px;
    }
    .filtered-table-wrap table {
      border: none;
      border-radius: 0;
    }
    .filtered-deals-table {
      table-layout: fixed;
    }
    .filtered-deals-table .cards {
      white-space: normal;
    }
    .filtered-table-wrap thead th {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .games-table-wrap .score-header th {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    th, td {
      border-bottom: 1px solid var(--table-border);
      padding: 6px 8px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      color: #d7def5;
      font-weight: 600;
      font-size: 12px;
      background: var(--table-head-bg);
    }
    tbody tr { background: var(--table-bg); }
    tbody tr:nth-child(even) { background: var(--table-bg-alt); }
    .clickable { cursor: pointer; color: var(--accent); }
    .clickable:hover { text-decoration: underline; }
    .game-row { cursor: pointer; }
    .game-row:hover td { background: rgba(139, 233, 253, 0.08); }
    .game-row.selected td {
      background: rgba(139, 233, 253, 0.18);
      box-shadow: inset 0 1px 0 rgba(139, 233, 253, 0.22), inset 0 -1px 0 rgba(139, 233, 253, 0.22);
    }
    .game-row.selected td:first-child {
      box-shadow: inset 3px 0 0 var(--accent), inset 0 1px 0 rgba(139, 233, 253, 0.22), inset 0 -1px 0 rgba(139, 233, 253, 0.22);
    }
    .deal { margin-bottom: 12px; border: 1px solid var(--table-border); border-radius: 10px; overflow: hidden; background: var(--table-bg); }
    .deal-head { background: var(--table-head-bg); padding: 8px 10px; font-weight: 700; }
    .deals-table { table-layout: fixed; }
    .deals-table .col-decision { width: auto; }
    .deals-table th, .deals-table td { white-space: normal; overflow-wrap: anywhere; }
    .deals-table .cards { white-space: normal; }
    .cards-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      min-height: 26px;
    }
    .card-img {
      width: 22px;
      height: 32px;
      object-fit: contain;
      flex: 0 0 auto;
    }
    .card-text-fallback {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: #d7def5;
      padding: 2px 4px;
      border: 1px solid rgba(126, 138, 168, 0.35);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.03);
      white-space: nowrap;
    }
    .heart, .diamond { color: var(--red); font-weight: 700; }
    .muted { color: var(--muted); }
    .empty { color: var(--muted); font-style: italic; padding: 10px 2px; }
    .pill {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid var(--table-border);
      background: var(--table-bg-alt);
      font-size: 12px;
    }
    .score-total td {
      font-weight: 700;
      border-top: 2px solid var(--table-border);
      border-bottom: 2px solid var(--table-border);
      background: var(--table-total-bg);
    }
    .score-header th { white-space: nowrap; }
    .score-header th.sortable { cursor: pointer; user-select: none; }
    .score-header th.sortable.active { color: var(--accent); }
    .col-game { white-space: nowrap; }
    .col-center { text-align: center; white-space: nowrap; }
    .col-decision { text-align: left; white-space: nowrap; width: 120px; }
    .suit-red { color: var(--red); font-weight: 700; }
    .score-good { color: var(--green); font-weight: 700; }
    .score-bad { color: var(--red); font-weight: 700; }
    .score-mid { color: var(--orange); font-weight: 700; }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--line); max-height: 36vh; }
      .summary-cards { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .hand-stats-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .summary-cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .hand-stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 460px) {
      .summary-cards { grid-template-columns: 1fr; }
      .hand-stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 id="app-title" title="Clear selection">PREFBUFF</h1>
      <div id="users"></div>
    </aside>
    <main class="main">
      <div id="content" class="section">
        <div class="empty">Select a user to view games and deals.</div>
      </div>
    </main>
  </div>
  <div id="stat-tooltip" class="stat-tooltip"></div>

  <script>
    const state = {
      users: [],
      selectedUserId: null,
      selectedGameId: null,
      selectedGameDisplayId: null,
      scoreSortKey: "game",
      scoreSortDir: "desc",
      games: [],
      gameDetails: null,
      gameDetailsMessage: "",
      handStats: null,
      handStatsCacheKey: "",
      handStatsLoading: false,
      handStatsError: "",
      handMatches: { hands: [], akq: [], akqj: [], aces3: [], miser: [], declarer: [], pass: [], passing: [], whist: [] },
      activeHandFilter: "",
      pendingGameScrollId: null
    };
    const VIEW_STATE_KEY = "prefbuff_view_state_v1";
    let refreshTimer = null;
    let refreshInFlight = false;
    const statTooltipEl = document.getElementById("stat-tooltip");

    function esc(v) {
      return String(v ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function normalizeCard(rawName) {
      const text = String(rawName ?? "").trim();
      const [rankRaw, suitRaw] = text.split("_of_");
      const rankKey = String(rankRaw ?? "").toLowerCase();
      const suitKey = String(suitRaw ?? "").toLowerCase();
      const rankPrettyMap = {
        ace: "A", a: "A",
        king: "K", k: "K",
        queen: "Q", q: "Q",
        jack: "J", j: "J",
        ten: "10", "10": "10", t: "10",
        nine: "9", "9": "9",
        eight: "8", "8": "8",
        seven: "7", "7": "7",
      };
      const suitPrettyMap = {
        spades: "♠", spade: "♠", s: "♠", "♠": "♠",
        diamonds: "♦", diamond: "♦", d: "♦", "♦": "♦",
        clubs: "♣", club: "♣", c: "♣", "♣": "♣",
        hearts: "♥", heart: "♥", h: "♥", "♥": "♥",
      };
      return {
        rank: rankPrettyMap[rankKey] ?? rankRaw ?? "",
        suit: suitPrettyMap[suitKey] ?? suitRaw ?? "",
      };
    }

    function cardPretty(name) {
      if (!name) return "";
      const { rank, suit } = normalizeCard(name);
      const suitHtml = (suit === "♥" || suit === "♦")
        ? `<span class="suit-red">${esc(suit)}</span>`
        : esc(suit);
      return `${esc(rank)}${suitHtml}`;
    }

    function sortCardNames(cards) {
      const suitOrder = { "♠": 1, "♦": 2, "♣": 3, "♥": 4 };
      const rankOrder = { "7": 1, "8": 2, "9": 3, "10": 4, J: 5, Q: 6, K: 7, A: 8 };
      return [...cards].sort((a, b) => {
        const lhs = normalizeCard(a);
        const rhs = normalizeCard(b);
        const s = (suitOrder[lhs.suit] ?? 99) - (suitOrder[rhs.suit] ?? 99);
        if (s) return s;
        return (rankOrder[lhs.rank] ?? 99) - (rankOrder[rhs.rank] ?? 99);
      });
    }

    function cardsHtml(cards) {
      return `<span class="cards-list">${sortCardNames(cards).map(cardImageHtml).join("")}</span>`;
    }

    function cardAssetName(name) {
      const text = String(name ?? "").trim();
      if (!text.includes("_of_")) return null;
      const [rankRaw, suitRaw] = text.split("_of_");
      const rankKey = String(rankRaw ?? "").toLowerCase();
      const suitKey = String(suitRaw ?? "").toLowerCase();
      const rankFileMap = {
        ace: "ace",
        king: "king",
        queen: "queen",
        jack: "jack",
        ten: "10",
        "10": "10",
        nine: "9",
        "9": "9",
        eight: "8",
        "8": "8",
        seven: "7",
        "7": "7",
      };
      const suitFileMap = {
        spades: "spades",
        spade: "spades",
        diamonds: "diamonds",
        diamond: "diamonds",
        clubs: "clubs",
        club: "clubs",
        hearts: "hearts",
        heart: "hearts",
      };
      const rank = rankFileMap[rankKey];
      const suit = suitFileMap[suitKey];
      if (!rank || !suit) return null;
      return `${rank}_of_${suit}.png`;
    }

    function cardImageHtml(name) {
      const filename = cardAssetName(name);
      if (!filename) {
        return `<span class="card-text-fallback">${cardPretty(name)}</span>`;
      }
      return `<img class="card-img" loading="lazy" src="/assets/cards/${encodeURIComponent(filename)}" alt="${esc(String(name))}" />`;
    }

    function formatDuration(totalSec) {
      const sec = Math.max(0, Number(totalSec || 0));
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0) return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function formatDateTime(epochSec) {
      const d = new Date(Number(epochSec || 0) * 1000);
      const date = d.toLocaleDateString("en-US", {
        month: "2-digit",
        day: "2-digit",
        year: "numeric"
      });
      const time = d.toLocaleTimeString("en-US", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: true
      });
      return { date, time };
    }

    function nameByPlayerId(playerId) {
      const user = state.users.find(u => u.player_id === playerId);
      return user?.player_name || playerId;
    }

    function normalizeContract(contract) {
      const text = String(contract ?? "").trim();
      return (text === "" || text === "-") ? "Pass" : text;
    }

    function isMiserContract(contract) {
      const key = String(contract ?? "").trim().toLowerCase().replaceAll(" ", "");
      return (
        key.includes("misère") ||
        key.includes("miser") ||
        key.includes("мизер") ||
        key.includes("mis.wt") ||
        key.includes("miswt")
      );
    }

    function isPassDecision(value) {
      const text = String(value ?? "").trim();
      const key = text.toLowerCase();
      return text === "-" || key === "pass";
    }

    function allPlayersPassed(deal) {
      const playerIds = Object.keys(deal?.hands || {});
      if (playerIds.length === 0) return false;
      return playerIds.every(pid => {
        const rawDecision = deal?.decisions?.[pid] ?? (pid === deal?.declarer_id ? deal?.contract : "");
        return isPassDecision(rawDecision);
      });
    }

    function bidHtml(text) {
      const normalized = normalizeContract(text);
      const safe = esc(normalized);
      return safe
        .replaceAll("♥", `<span class="suit-red">♥</span>`)
        .replaceAll("♦", `<span class="suit-red">♦</span>`);
    }

    async function api(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${path}`);
      return await res.json();
    }

    function saveViewState() {
      try {
        localStorage.setItem(VIEW_STATE_KEY, JSON.stringify({
          selectedUserId: state.selectedUserId,
          selectedGameId: state.selectedGameId,
          scoreSortKey: state.scoreSortKey,
          scoreSortDir: state.scoreSortDir,
        }));
      } catch (_) {}
    }

    function loadViewState() {
      try {
        const raw = localStorage.getItem(VIEW_STATE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        state.selectedUserId = parsed?.selectedUserId ?? null;
        state.selectedGameId = Number.isInteger(parsed?.selectedGameId) ? parsed.selectedGameId : null;
        state.scoreSortKey = parsed?.scoreSortKey || "game";
        state.scoreSortDir = (parsed?.scoreSortDir === "asc" || parsed?.scoreSortDir === "desc") ? parsed.scoreSortDir : "desc";
      } catch (_) {}
    }

    function applySelectedUserIdFromUrl() {
      try {
        const url = new URL(window.location.href);
        const selectedUserId = url.searchParams.get("selectedUserId");
        if (!selectedUserId) return { selectedUserFromUrl: false, selectLatestGame: false };
        const selectLatestGame = url.searchParams.get("selectLatestGame") === "1";
        state.selectedUserId = selectedUserId;
        state.selectedGameId = null;
        state.selectedGameDisplayId = null;
        url.searchParams.delete("selectedUserId");
        url.searchParams.delete("selectLatestGame");
        window.history.replaceState({}, "", url.pathname + url.search + url.hash);
        return { selectedUserFromUrl: true, selectLatestGame };
      } catch (_) {}
      return { selectedUserFromUrl: false, selectLatestGame: false };
    }

    function latestGameId(games) {
      let latest = null;
      for (const g of (Array.isArray(games) ? games : [])) {
        const id = Number(g?.id || 0);
        const timestamp = Number(g?.timestamp || 0);
        if (!Number.isFinite(id)) continue;
        if (!latest || timestamp > latest.timestamp || (timestamp === latest.timestamp && id > latest.id)) {
          latest = { id, timestamp };
        }
      }
      return latest ? latest.id : null;
    }

    function syncSelectedGameDisplayId() {
      if (state.selectedGameId === null) {
        state.selectedGameDisplayId = null;
        return;
      }
      const row = buildScoreRows(state.games).find(r => r.id === state.selectedGameId);
      state.selectedGameDisplayId = row ? row.displayId : null;
    }

    function resetHandStats() {
      state.handStats = null;
      state.handStatsCacheKey = "";
      state.handStatsLoading = false;
      state.handStatsError = "";
      state.handMatches = { hands: [], akq: [], akqj: [], aces3: [], miser: [], declarer: [], pass: [], passing: [], whist: [] };
    }

    function hasSuitedRanksInHand(cards, requiredRanks) {
      const bySuit = { "♠": [], "♦": [], "♣": [], "♥": [] };
      for (const c of (Array.isArray(cards) ? cards : [])) {
        const n = normalizeCard(c);
        if (bySuit[n.suit]) bySuit[n.suit].push(n.rank);
      }
      return Object.values(bySuit).some(ranks => requiredRanks.every(r => ranks.includes(r)));
    }

    function collectAkqMatchesForPlayer(playerId, gameDetailsList) {
      const gameMetaById = new Map(state.games.map(g => [Number(g.id), g]));
      const gameRowsById = new Map(buildScoreRows(state.games).map(r => [Number(r.id), r]));
      const decisionPlayerName = nameByPlayerId(playerId);
      const matches = [];
      for (const game of gameDetailsList) {
        const gameId = Number(game?.id || 0);
        const gameMeta = gameMetaById.get(gameId);
        const gameRow = gameRowsById.get(gameId);
        const dt = formatDateTime(gameMeta?.timestamp || 0);
        const deals = Array.isArray(game?.deals) ? game.deals : [];
        for (const deal of deals) {
          const cards = deal?.hands?.[playerId];
          if (!Array.isArray(cards) || cards.length === 0) continue;
          if (!hasSuitedRanksInHand(cards, ["A", "K", "Q"])) continue;
          const rawDecision = deal?.decisions?.[playerId] ?? (deal?.declarer_id === playerId ? deal?.contract : "");
          matches.push({
            gameId,
            gameDisplayId: Number(gameRow?.displayId || gameId),
            dealId: Number(deal?.id || 0),
            date: dt.date,
            time: dt.time,
            contract: deal?.contract || "",
            declarerId: String(deal?.declarer_id || ""),
            declarerName: deal?.declarer_name || deal?.declarer_id || "-",
            decision: normalizeContract(rawDecision),
            decisionPlayerName,
            tricks: Number(deal?.tricks?.[playerId] || 0),
            dpw: `${Number(deal?.scores?.[playerId]?.dump || 0)}/${Number(deal?.scores?.[playerId]?.pool || 0)}/${Number(deal?.scores?.[playerId]?.whists || 0)}`,
            mmr: Number(deal?.scores?.[playerId]?.mmr || 0),
            cards,
            talon: Array.isArray(deal?.talon) ? deal.talon : []
          });
        }
      }
      return matches.sort((a, b) => {
        if (b.gameId !== a.gameId) return b.gameId - a.gameId;
        return b.dealId - a.dealId;
      });
    }

    function collectMatchesForPlayer(playerId, gameDetailsList, matchFn) {
      const gameMetaById = new Map(state.games.map(g => [Number(g.id), g]));
      const gameRowsById = new Map(buildScoreRows(state.games).map(r => [Number(r.id), r]));
      const decisionPlayerName = nameByPlayerId(playerId);
      const matches = [];
      for (const game of gameDetailsList) {
        const gameId = Number(game?.id || 0);
        const gameMeta = gameMetaById.get(gameId);
        const gameRow = gameRowsById.get(gameId);
        const dt = formatDateTime(gameMeta?.timestamp || 0);
        const deals = Array.isArray(game?.deals) ? game.deals : [];
        for (const deal of deals) {
          const cards = deal?.hands?.[playerId];
          if (!Array.isArray(cards) || cards.length === 0) continue;
          if (!matchFn(cards, deal, playerId)) continue;
          const rawDecision = deal?.decisions?.[playerId] ?? (deal?.declarer_id === playerId ? deal?.contract : "");
          const decisionText = String(rawDecision ?? "").trim();
          const decisionKey = decisionText.toLowerCase();
          matches.push({
            gameId,
            gameDisplayId: Number(gameRow?.displayId || gameId),
            dealId: Number(deal?.id || 0),
            date: dt.date,
            time: dt.time,
            contract: deal?.contract || "",
            declarerId: String(deal?.declarer_id || ""),
            declarerName: deal?.declarer_name || deal?.declarer_id || "-",
            decision: normalizeContract(rawDecision),
            decisionPlayerName,
            decisionText,
            decisionKey,
            tricks: Number(deal?.tricks?.[playerId] || 0),
            dpw: `${Number(deal?.scores?.[playerId]?.dump || 0)}/${Number(deal?.scores?.[playerId]?.pool || 0)}/${Number(deal?.scores?.[playerId]?.whists || 0)}`,
            mmr: Number(deal?.scores?.[playerId]?.mmr || 0),
            cards,
            talon: Array.isArray(deal?.talon) ? deal.talon : []
          });
        }
      }
      return matches.sort((a, b) => {
        if (b.gameId !== a.gameId) return b.gameId - a.gameId;
        return b.dealId - a.dealId;
      });
    }

    async function loadSelectedGameDetails() {
      if (state.selectedGameId === null) {
        state.gameDetails = null;
        state.gameDetailsMessage = "";
        return;
      }
      try {
        state.gameDetails = await api(`api/games/${state.selectedGameId}`);
        if (!Array.isArray(state.gameDetails?.deals) || state.gameDetails.deals.length === 0) {
          state.gameDetailsMessage = `No deal data for game ${state.selectedGameDisplayId ?? state.selectedGameId}.`;
        } else {
          state.gameDetailsMessage = "";
        }
      } catch (_) {
        state.gameDetails = null;
        state.gameDetailsMessage = `No deal data for game ${state.selectedGameDisplayId ?? state.selectedGameId}.`;
      }
    }

    function percentText(value, total) {
      if (!total) return "0.0%";
      return `${((value * 100) / total).toFixed(1)}%`;
    }

    function computeHandStatsForPlayer(playerId, gameDetailsList) {
      const suitOrder = ["♠", "♦", "♣", "♥"];
      let handsCount = 0;
      let hcpTotal = 0;
      let cardPointsTotal = 0;
      let suitedAKQ = 0;
      let suitedAKQJ = 0;
      let threePlusAces = 0;
      let declarerCount = 0;
      let declarerMadeCount = 0;
      let miserCount = 0;
      let miserMadeCount = 0;
      let declarerTalonHcpTotal = 0;
      let decisionSamples = 0;
      let passCount = 0;
      let passMadeCount = 0;
      let passingCount = 0;
      let passingMadeCount = 0;
      let whistLikeCount = 0;
      let whistMadeCount = 0;

      const hcpByRank = { A: 4, K: 3, Q: 2, J: 1 };
      const cardPointsByRank = { A: 8, K: 7, Q: 6, J: 5, "10": 4, "9": 3, "8": 2, "7": 1 };
      for (const game of gameDetailsList) {
        const deals = Array.isArray(game?.deals) ? game.deals : [];
        for (const deal of deals) {
          const cards = deal?.hands?.[playerId];
          if (!Array.isArray(cards) || cards.length === 0) continue;
          handsCount += 1;
          const dealMmr = Number(deal?.scores?.[playerId]?.mmr || 0);
          if (deal?.declarer_id === playerId) {
            declarerCount += 1;
            const declarerDealMmr = dealMmr;
            if (declarerDealMmr > 0) declarerMadeCount += 1;
            if (isMiserContract(deal?.contract)) {
              miserCount += 1;
              if (declarerDealMmr > 0) miserMadeCount += 1;
            }
            const talon = Array.isArray(deal?.talon) ? deal.talon : [];
            let talonHcp = 0;
            for (const tc of talon) {
              const rank = normalizeCard(tc).rank;
              talonHcp += Number(hcpByRank[rank] || 0);
            }
            declarerTalonHcpTotal += talonHcp;
          }
          const rawDecision = deal?.decisions?.[playerId] ?? (deal?.declarer_id === playerId ? deal?.contract : "");
          const decisionText = String(rawDecision ?? "").trim();
          if (decisionText !== "") {
            decisionSamples += 1;
            const decisionKey = decisionText.toLowerCase();
            if (isPassDecision(rawDecision)) {
              passCount += 1;
              if (dealMmr > 0) passMadeCount += 1;
            }
            if (decisionKey.includes("whist")) {
              whistLikeCount += 1;
              if (dealMmr > 0) whistMadeCount += 1;
            }
          }
          if (allPlayersPassed(deal)) {
            passingCount += 1;
            if (dealMmr > 0) passingMadeCount += 1;
          }

          const bySuit = { "♠": [], "♦": [], "♣": [], "♥": [] };
          let aces = 0;
          let hcp = 0;
          let cardPoints = 0;
          for (const c of cards) {
            const n = normalizeCard(c);
            const suit = n.suit;
            const rank = n.rank;
            if (bySuit[suit]) bySuit[suit].push(rank);
            if (rank === "A") aces += 1;
            hcp += Number(hcpByRank[rank] || 0);
            cardPoints += Number(cardPointsByRank[rank] || 0);
          }
          hcpTotal += hcp;
          cardPointsTotal += cardPoints;
          if (aces >= 3) threePlusAces += 1;

          const hasSuitRanks = (ranks, required) => required.every(r => ranks.includes(r));
          let handHasAKQ = false;
          let handHasAKQJ = false;
          for (const suit of suitOrder) {
            const ranks = bySuit[suit];
            if (hasSuitRanks(ranks, ["A", "K", "Q"])) {
              handHasAKQ = true;
            }
            if (hasSuitRanks(ranks, ["A", "K", "Q", "J"])) {
              handHasAKQJ = true;
            }
          }
          if (handHasAKQ) suitedAKQ += 1;
          if (handHasAKQJ) suitedAKQJ += 1;
        }
      }

      return {
        handsCount,
        avgHcp: handsCount ? (hcpTotal / handsCount) : 0,
        avgCardPoints: handsCount ? (cardPointsTotal / handsCount) : 0,
        suitedAKQRate: handsCount ? ((suitedAKQ * 100) / handsCount) : 0,
        suitedAKQJRate: handsCount ? ((suitedAKQJ * 100) / handsCount) : 0,
        threePlusAcesRate: handsCount ? ((threePlusAces * 100) / handsCount) : 0,
        suitedAKQPct: percentText(suitedAKQ, handsCount),
        suitedAKQJPct: percentText(suitedAKQJ, handsCount),
        threePlusAcesPct: percentText(threePlusAces, handsCount),
        declarerPct: percentText(declarerCount, handsCount),
        declarerMadePct: percentText(declarerMadeCount, declarerCount),
        miserCount,
        miserMadePct: percentText(miserMadeCount, miserCount),
        avgDeclarerTalonHcp: declarerCount ? (declarerTalonHcpTotal / declarerCount) : 0,
        passRatePct: percentText(passCount, decisionSamples),
        passMadePct: percentText(passMadeCount, passCount),
        passingRatePct: percentText(passingCount, handsCount),
        passingMadePct: percentText(passingMadeCount, passingCount),
        whistRatePct: percentText(whistLikeCount, decisionSamples),
        whistMadePct: percentText(whistMadeCount, whistLikeCount),
      };
    }

    async function loadHandStatsIfNeeded() {
      if (!state.selectedUserId) return;
      const cacheKey = `${state.selectedUserId}:${state.games.length}:${state.games[0]?.id || 0}`;
      if (state.handStatsCacheKey === cacheKey || state.handStatsLoading) return;
      state.handStatsLoading = true;
      state.handStatsError = "";
      renderMain();
      const userIdAtRequestStart = state.selectedUserId;
      try {
        const allGameDetails = await Promise.all(
          state.games.map(g => api(`api/games/${g.id}`).catch(() => null))
        );
        if (state.selectedUserId !== userIdAtRequestStart) return;
        const valid = allGameDetails.filter(Boolean);
        state.handStats = computeHandStatsForPlayer(state.selectedUserId, valid);
        state.handMatches = {
          hands: collectMatchesForPlayer(state.selectedUserId, valid, () => true),
          akq: collectAkqMatchesForPlayer(state.selectedUserId, valid),
          akqj: collectMatchesForPlayer(state.selectedUserId, valid, cards => hasSuitedRanksInHand(cards, ["A", "K", "Q", "J"])),
          aces3: collectMatchesForPlayer(state.selectedUserId, valid, cards => {
            let aces = 0;
            for (const c of cards) {
              if (normalizeCard(c).rank === "A") aces += 1;
            }
            return aces >= 3;
          }),
          miser: collectMatchesForPlayer(state.selectedUserId, valid, (_cards, deal, playerId) => {
            if (deal?.declarer_id !== playerId) return false;
            return isMiserContract(deal?.contract);
          }),
          declarer: collectMatchesForPlayer(state.selectedUserId, valid, (_cards, deal, playerId) => deal?.declarer_id === playerId),
          pass: collectMatchesForPlayer(state.selectedUserId, valid, (_cards, deal, playerId) => {
            const rawDecision = deal?.decisions?.[playerId] ?? (deal?.declarer_id === playerId ? deal?.contract : "");
            return isPassDecision(rawDecision);
          }),
          passing: collectMatchesForPlayer(state.selectedUserId, valid, (_cards, deal) => {
            return allPlayersPassed(deal);
          }),
          whist: collectMatchesForPlayer(state.selectedUserId, valid, (_cards, deal, playerId) => {
            const rawDecision = deal?.decisions?.[playerId] ?? (deal?.declarer_id === playerId ? deal?.contract : "");
            const decisionKey = String(rawDecision ?? "").trim().toLowerCase();
            return decisionKey.includes("whist");
          }),
        };
        state.handStatsCacheKey = cacheKey;
      } catch (err) {
        if (state.selectedUserId !== userIdAtRequestStart) return;
        state.handStatsError = String(err?.message || err || "Failed to load hand stats.");
      } finally {
        if (state.selectedUserId === userIdAtRequestStart) {
          state.handStatsLoading = false;
          renderMain();
        }
      }
    }

    async function selectGame(gameId, gameDisplayId = null) {
      state.activeHandFilter = "";
      state.selectedGameId = Number(gameId);
      state.pendingGameScrollId = Number(gameId);
      state.selectedGameDisplayId = gameDisplayId !== null ? Number(gameDisplayId) : null;
      if (state.selectedGameDisplayId === null) syncSelectedGameDisplayId();
      state.gameDetails = null;
      state.gameDetailsMessage = "";
      saveViewState();
      renderMain();
      await loadSelectedGameDetails();
      renderMain();
    }

    function renderUsers() {
      const usersEl = document.getElementById("users");
      usersEl.innerHTML = state.users.map(u => {
        const mmrText = `${u.total_mmr > 0 ? "+" : ""}${u.total_mmr}`;
        return `
        <div class="list-item ${u.player_id === state.selectedUserId ? "active" : ""}" data-user-id="${esc(u.player_id)}">
          <div class="name">${esc(u.player_name)}</div>
          <div class="meta">MMR: <span class="${scoreClass(mmrText)}">${esc(mmrText)}</span></div>
        </div>
        `;
      }).join("");
      usersEl.querySelectorAll("[data-user-id]").forEach(el => {
        el.addEventListener("click", async () => {
          state.selectedUserId = el.dataset.userId;
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          resetHandStats();
          await loadGames();
          saveViewState();
          render();
          loadHandStatsIfNeeded().catch(() => {});
        });

    function dealRows(deal) {
      const pids = Object.keys(deal.hands || {}).sort();
      return pids.map(pid => {
        const rawDecision = deal.decisions?.[pid] ?? (pid === deal.declarer_id ? deal.contract : "");
        const decision = normalizeContract(rawDecision);
        const tricks = deal.tricks?.[pid] ?? 0;
        const score = deal.scores?.[pid] || {};
        const dpw = `${Number(score.dump || 0)}/${Number(score.pool || 0)}/${Number(score.whists || 0)}`;
        const mmr = Number(score.mmr || 0);
        const mmrText = `${mmr > 0 ? "+" : ""}${mmr}`;
        return `
          <tr>
            <td>${esc(nameByPlayerId(pid))}</td>
            <td class="col-decision"><span class="pill">${bidHtml(decision)}</span></td>
            <td>${esc(tricks)}</td>
            <td>${esc(dpw)}</td>
            <td class="${scoreClass(mmrText)}">${esc(mmrText)}</td>
            <td class="cards">${cardsHtml(deal.hands[pid] || [])}</td>
          </tr>
        `;
      }).join("");
    }

    function buildScoreRows(games) {
      const asc = [...games].sort((a, b) => a.id - b.id);
      let run = 0;
      const mmrDiffById = new Map();
      for (const g of asc) {
        run += Number(g.mmr || 0);
        mmrDiffById.set(g.id, run);
      }
      const desc = [...asc].reverse();
      return desc.map((g, idx) => {
        const mmr = Number(g.mmr || 0);
        const resultLabel = mmr === 0 ? "Draw" : (mmr > 0 ? "Win" : "Lost");
        const sign = mmr > 0 ? "+" : "";
        const result = `${resultLabel} (${sign}${mmr})`;
        const mmrTotal = Number(mmrDiffById.get(g.id) || 0);
        const mmrTotalText = `${mmrTotal > 0 ? "+" : ""}${mmrTotal}`;
        const { date, time } = formatDateTime(g.timestamp);
        return {
          id: g.id,
          displayId: desc.length - idx,
          timestamp: Number(g.timestamp || 0),
          date,
          time,
          durationSec: Number(g.duration || 0),
          duration: formatDuration(g.duration),
          mmr,
          result,
          mmrTotal,
          mmrTotalText,
          pool: Number(g.pool || 0),
          dump: Number(g.dump || 0),
          whists: Number(g.whists || 0),
          dpw: `${g.dump}/${g.pool}/${g.whists}`,
          gameType: g.game_type === "RANKED" ? "Ranked" : "Normal",
        };
      });
    }

    function defaultSortDirFor(key) {
      return key === "type" ? "asc" : "desc";
    }

    function sortIndicator(key) {
      if (state.scoreSortKey !== key) return "";
      return state.scoreSortDir === "asc" ? " ▲" : " ▼";
    }

    function compareScoreRows(a, b, key) {
      if (key === "game") return a.displayId - b.displayId;
      if (key === "date" || key === "time") return a.timestamp - b.timestamp;
      if (key === "duration") return a.durationSec - b.durationSec;
      if (key === "result") return a.mmr - b.mmr;
      if (key === "mmr") return a.mmrTotal - b.mmrTotal;
      if (key === "dpw") {
        if (a.dump !== b.dump) return a.dump - b.dump;
        if (a.pool !== b.pool) return a.pool - b.pool;
        return a.whists - b.whists;
      }
      if (key === "type") return a.gameType.localeCompare(b.gameType);
      return 0;
    }

    function sortScoreRows(rows) {
      const key = state.scoreSortKey;
      const dir = state.scoreSortDir === "asc" ? 1 : -1;
      return [...rows].sort((a, b) => {
        const c = compareScoreRows(a, b, key);
        if (c !== 0) return c * dir;
        return (b.displayId - a.displayId);
      });
    }

    function buildTotals(games) {
      const totalGames = games.length;
      const totalWins = games.filter(g => Number(g.mmr || 0) > 0).length;
      const totalLosses = games.filter(g => Number(g.mmr || 0) < 0).length;
      const denom = totalWins + totalLosses;
      const winRate = denom > 0 ? Math.floor((totalWins / denom) * 100) : 0;
      const totalMmr = games.reduce((acc, g) => acc + Number(g.mmr || 0), 0);
      const totalPool = games.reduce((acc, g) => acc + Number(g.pool || 0), 0);
      const totalDump = games.reduce((acc, g) => acc + Number(g.dump || 0), 0);
      const totalWhists = games.reduce((acc, g) => acc + Number(g.whists || 0), 0);
      const totalDurationSec = games.reduce((acc, g) => acc + Number(g.duration || 0), 0);
      const avgDurationSec = totalGames > 0 ? Math.round(totalDurationSec / totalGames) : 0;
      return {
        totalGames,
        winRate,
        totalMmr,
        totalPool,
        totalDump,
        totalWhists,
        totalDurationSec,
        avgDurationSec,
        totalDPW: `${totalDump}/${totalPool}/${totalWhists}`,
        totalDuration: formatDuration(totalDurationSec),
        avgDuration: formatDuration(avgDurationSec),
        resultText: `${winRate}% WIN RATE`,
      };
    }

    function buildMmrTrendSvg(games) {
      const asc = [...games].sort((a, b) => Number(a.id) - Number(b.id));
      if (asc.length === 0) {
        return {
          svg: `<svg class="trend-svg" viewBox="0 0 560 96" preserveAspectRatio="none"></svg>`,
          start: 0,
          end: 0
        };
      }
      let running = 0;
      const cumulative = asc.map(g => {
        running += Number(g.mmr || 0);
        return running;
      });
      const width = 560;
      const height = 96;
      const padX = 6;
      const padY = 8;
      const minV = Math.min(...cumulative);
      const maxV = Math.max(...cumulative);
      const span = Math.max(1, maxV - minV);
      const innerW = Math.max(1, width - padX * 2);
      const innerH = Math.max(1, height - padY * 2);
      const stepX = cumulative.length > 1 ? innerW / (cumulative.length - 1) : 0;
      const points = cumulative.map((v, i) => {
        const x = padX + i * stepX;
        const y = padY + (1 - ((v - minV) / span)) * innerH;
        return `${x.toFixed(2)},${y.toFixed(2)}`;
      }).join(" ");
      const zeroY = padY + (1 - ((0 - minV) / span)) * innerH;
      const zeroVisible = zeroY >= padY && zeroY <= (height - padY);
      const endValue = cumulative[cumulative.length - 1];
      const stroke = endValue >= 0 ? "var(--green)" : "var(--red)";
      return {
        svg: `
          <svg class="trend-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
            ${zeroVisible ? `<line x1="${padX}" y1="${zeroY.toFixed(2)}" x2="${width - padX}" y2="${zeroY.toFixed(2)}" stroke="#6272a4" stroke-width="1" stroke-dasharray="4 3"></line>` : ""}
            <polyline points="${points}" fill="none" stroke="${stroke}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"></polyline>
          </svg>
        `,
        start: 0,
        end: endValue
      };
    }

    function scoreClass(cell) {
      const text = String(cell ?? "").trim();
      const goodWinrate = 51;
      const badWinrate = 39;
      if (!text) return "";
      if (/^[+-]?\d+$/.test(text)) {
        const value = Number(text);
        if (value > 0) return "score-good";
        if (value < 0) return "score-bad";
        return "score-mid";
      }
      if (text === "0" || text === "+0") {
        return "score-mid";
      }
      if (
        text.startsWith("+") ||
        text.startsWith("Win") ||
        (text.includes("%") && Number.parseInt(text, 10) >= goodWinrate)
      ) {
        return "score-good";
      }
      if (
        (text.startsWith("-") && text !== "-") ||
        text.startsWith("Lost") ||
        (text.includes("%") && Number.parseInt(text, 10) <= badWinrate)
      ) {
        return "score-bad";
      }
      if (
        text === "0" ||
        text.startsWith("Draw") ||
        (text.includes("%") &&
          Number.parseInt(text, 10) < goodWinrate &&
          Number.parseInt(text, 10) > badWinrate)
      ) {
        return "score-mid";
      }
      return "";
    }

    function moveStatTooltip(e) {
      if (!statTooltipEl || statTooltipEl.style.display !== "block") return;
      const pad = 12;
      const w = statTooltipEl.offsetWidth || 260;
      const h = statTooltipEl.offsetHeight || 80;
      let left = e.clientX + pad;
      let top = e.clientY + pad;
      if (left + w > window.innerWidth - 8) left = e.clientX - w - pad;
      if (left < 8) left = 8;
      if (top + h > window.innerHeight - 8) top = e.clientY - h - pad;
      if (top < 8) top = 8;
      statTooltipEl.style.left = `${left}px`;
      statTooltipEl.style.top = `${top}px`;
    }

    function showStatTooltip(text, e) {
      if (!statTooltipEl || !text) return;
      statTooltipEl.textContent = text;
      statTooltipEl.style.display = "block";
      moveStatTooltip(e);
    }

    function hideStatTooltip() {
      if (!statTooltipEl) return;
      statTooltipEl.style.display = "none";
    }

    function formatSignedDelta(value) {
      const v = Number(value || 0);
      if (Math.abs(v) < 0.005) return "0.00";
      return `${v > 0 ? "+" : ""}${v.toFixed(2)}`;
    }

    function formatSignedPpDelta(value) {
      const v = Number(value || 0);
      if (Math.abs(v) < 0.005) return "0.00";
      return `${v > 0 ? "+" : ""}${v.toFixed(2)}`;
    }

    function formatSignedInteger(value) {
      const n = Math.trunc(Number(value || 0));
      return `${n > 0 ? "+" : ""}${n}`;
    }

    function formatDealSplit(matches, filterKey) {
      const list = Array.isArray(matches) ? matches : [];
      const total = list.length;
      if (!["hands", "akq", "akqj", "aces3", "declarer", "pass", "passing", "whist", "miser"].includes(filterKey)) return `${total}`;
      let positive = 0;
      let negative = 0;
      let totalMmr = 0;
      for (const match of list) {
        const mmr = Number(match?.mmr || 0);
        totalMmr += mmr;
        if (mmr > 0) {
          positive += 1;
        } else if (mmr < 0) {
          negative += 1;
        }
      }
      if (filterKey === "hands") {
        return `${total} • <span class="score-good">${positive}</span> • <span class="score-bad">${negative}</span>`;
      }
      return `${total} • <span class="score-good">${positive}</span> • <span class="score-bad">${negative}</span> • <span class="${scoreClass(formatSignedInteger(totalMmr))}">${formatSignedInteger(totalMmr)}</span><span class="mmr-suffix"> MMR</span>`;
    }

    function renderMain() {
      const content = document.getElementById("content");
      const mainEl = document.querySelector("main.main");
      const prevMainScrollTop = mainEl ? mainEl.scrollTop : 0;
      const prevGamesScrollTop = content.querySelector(".games-table-wrap")?.scrollTop ?? 0;
      const prevFilteredScrollTop = content.querySelector(".filtered-table-wrap")?.scrollTop ?? 0;
      if (!state.selectedUserId) {
        content.innerHTML = `<div class="empty">Select a user to view games and deals.</div>`;
        return;
      }
      const user = state.users.find(u => u.player_id === state.selectedUserId);
      if (!user) {
        content.innerHTML = `<div class="empty">Selected user is not available.</div>`;
        return;
      }

      const rows = sortScoreRows(buildScoreRows(state.games));

    function syncGamesTableViewport(contentRoot) {
      const wrap = contentRoot.querySelector(".games-table-wrap");
      if (!wrap) return;
      if (state.selectedGameId === null) {
        wrap.style.maxHeight = "none";
        return;
      }
      const headerRow = wrap.querySelector("thead tr");
      const firstDataRow = wrap.querySelector("tbody tr");
      if (!headerRow || !firstDataRow) {
        wrap.style.maxHeight = "none";
        return;
      }
      const headerH = headerRow.getBoundingClientRect().height;
      const rowH = firstDataRow.getBoundingClientRect().height;
      const target = Math.ceil(headerH + rowH * 3 + 2);
      wrap.style.maxHeight = `${target}px`;
    }

    function syncSelectedGameIntoView(contentRoot) {
      if (state.pendingGameScrollId === null) return;
      const wrap = contentRoot.querySelector(".games-table-wrap");
      if (!wrap) {
        state.pendingGameScrollId = null;
        return;
      }
      const row = wrap.querySelector(`tr[data-game-id="${state.pendingGameScrollId}"]`);
      if (!row) {
        state.pendingGameScrollId = null;
        return;
      }
      const rowTop = row.offsetTop;
      const rowBottom = rowTop + row.offsetHeight;
      const viewTop = wrap.scrollTop;
      const viewBottom = viewTop + wrap.clientHeight;
      if (rowTop < viewTop) {
        wrap.scrollTop = rowTop;
      } else if (rowBottom > viewBottom) {
        wrap.scrollTop = rowBottom - wrap.clientHeight;
      }
      state.pendingGameScrollId = null;
    }

    function syncFilteredTableViewport(contentRoot) {
      const wrap = contentRoot.querySelector(".filtered-table-wrap");
      if (!wrap) return;
      const headerRow = wrap.querySelector("thead tr");
      const firstDataRow = wrap.querySelector("tbody tr");
      if (!headerRow || !firstDataRow) {
        wrap.style.maxHeight = "none";
        return;
      }
      const headerH = headerRow.getBoundingClientRect().height;
      const rowH = firstDataRow.getBoundingClientRect().height;
      const target = Math.ceil(headerH + rowH * 6 + 2);
      wrap.style.maxHeight = `${target}px`;
    }

    function render() {
      renderUsers();
      renderMain();
    }

    async function loadUsers() {
      state.users = await api("api/users");
    }

    async function loadGames() {
      state.games = await api(`api/users/${encodeURIComponent(state.selectedUserId)}/games`);
    }

    async function refreshData() {
      if (refreshInFlight) return;
      refreshInFlight = true;
      try {
        await loadUsers();
        if (state.selectedUserId && !state.users.some(u => u.player_id === state.selectedUserId)) {
          state.selectedUserId = null;
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
          state.gameDetails = null;
          state.gameDetailsMessage = "";
          saveViewState();
          render();
          return;
        }
        if (state.selectedUserId) {
          await loadGames();
          syncSelectedGameDisplayId();
          if (state.selectedGameId && !state.games.some(g => Number(g.id) === state.selectedGameId)) {
            state.selectedGameId = null;
            state.selectedGameDisplayId = null;
            state.gameDetails = null;
            state.gameDetailsMessage = "";
            saveViewState();
            render();
            return;
          }
          if (state.selectedGameId !== null) {
            await loadSelectedGameDetails();
          }
        }
        render();
      } finally {
        refreshInFlight = false;
      }
    }

    function startAutoRefresh() {
      if (refreshTimer !== null) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => {
        refreshData().catch(() => {});
      }, 5000);
    }

          appTitle.addEventListener("click", () => {
            state.selectedUserId = null;
            state.selectedGameId = null;
            state.selectedGameDisplayId = null;
            state.gameDetails = null;
            state.gameDetailsMessage = "";
            saveViewState();
            render();
          });
        }
        loadViewState();
        const urlSelection = applySelectedUserIdFromUrl();
        await loadUsers();
        if (state.selectedUserId && state.users.some(u => u.player_id === state.selectedUserId)) {
          await loadGames();
          if (urlSelection.selectedUserFromUrl && urlSelection.selectLatestGame) {
            state.selectedGameId = latestGameId(state.games);
            syncSelectedGameDisplayId();
            if (state.selectedGameId !== null) {
              await loadSelectedGameDetails();
            }
          } else {
            syncSelectedGameDisplayId();
            if (state.selectedGameId !== null && state.games.some(g => Number(g.id) === state.selectedGameId)) {
              await loadSelectedGameDetails();
            } else {
              state.selectedGameId = null;
              state.selectedGameDisplayId = null;
            }
          }
        } else {
          state.selectedUserId = null;
          state.selectedGameId = null;
          state.selectedGameDisplayId = null;
        }
        saveViewState();
        render();
        startAutoRefresh();
      } catch (err) {
        document.getElementById("content").innerHTML =
          `<div class="empty">Failed to load data: ${esc(err?.message || err)}</div>`;
      }
    }

    boot();
  </script>
</body>
</html>
